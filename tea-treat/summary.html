<!DOCTYPE html>
<html lang="zh-Hant-HK">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Order 總覽 · 請食 Tea</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d0b1a;--card:#16132b;--card2:#1e1a38;--border:rgba(255,255,255,.07);--accent:#ff6b9d;--accent2:#c44dff;--cyan:#4de8ff;--gold:#ffc94d;--green:#4dff88;--red:#ff5252;--muted:#7a7890;--text:#ede8f5}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:16px}
.container{max-width:600px;margin:0 auto}

.hero{text-align:center;padding:20px;background:linear-gradient(135deg,rgba(77,232,255,.06),rgba(196,77,255,.06));border-radius:20px;margin-bottom:16px;border:1px solid var(--border)}
.hero h1{font-size:1.3rem;font-weight:900}
.hero .restaurant{color:var(--cyan);font-size:.9rem;margin-top:2px}

.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;text-align:center}
.stat .num{font-size:1.4rem;font-weight:900}
.stat .label{font-size:.72rem;color:var(--muted);margin-top:2px}
.stat.green .num{color:var(--green)}.stat.gold .num{color:var(--gold)}.stat.cyan .num{color:var(--cyan)}

.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:14px}
.card h2{font-size:.95rem;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}

/* Consolidated order */
.consolidated-item{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-radius:10px;background:var(--card2);margin-bottom:6px}
.consolidated-item .name{font-weight:600;font-size:.92rem}
.consolidated-item .detail{display:flex;align-items:center;gap:10px}
.consolidated-item .qty{background:rgba(255,107,157,.15);color:var(--accent);padding:3px 10px;border-radius:999px;font-weight:800;font-size:.85rem}
.consolidated-item .subtotal{color:var(--gold);font-size:.85rem;font-weight:700}

/* Person orders */
.person-card{background:var(--card2);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:8px}
.person-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.person-name{font-weight:800;font-size:.95rem}
.person-time{color:var(--muted);font-size:.75rem}
.person-items{display:flex;flex-direction:column;gap:4px}
.person-item{display:flex;justify-content:space-between;font-size:.85rem;color:var(--muted)}
.person-item .pi-name{flex:1}
.person-item .pi-qty{width:30px;text-align:center}
.person-item .pi-price{width:60px;text-align:right;color:var(--gold)}
.person-remark{margin-top:6px;font-size:.78rem;color:var(--gold);background:rgba(255,201,77,.08);padding:4px 8px;border-radius:8px}

.actions{display:flex;gap:10px;margin-top:16px}
.btn{flex:1;padding:12px;border-radius:12px;border:none;font-size:.92rem;font-weight:700;cursor:pointer;text-align:center;text-decoration:none;display:inline-block}
.btn-primary{color:#fff;background:linear-gradient(135deg,var(--accent),var(--accent2))}
.btn-secondary{color:var(--text);background:var(--card2);border:1px solid var(--border)}
.btn-danger{color:var(--red);background:rgba(255,82,82,.1);border:1px solid rgba(255,82,82,.2)}

.loading{text-align:center;padding:40px;color:var(--muted)}
.refresh-note{text-align:center;color:var(--muted);font-size:.75rem;margin-top:8px}
.toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:999px;padding:8px 14px;font-size:.84rem;z-index:200;display:none}
.toast.show{display:block}

@media(max-width:500px){.stats{grid-template-columns:repeat(3,1fr)}}
</style>
</head>
<body>
<div class="container">
  <div id="loading" class="loading">⏳ 載入中...</div>
  <div id="summaryPage" style="display:none">
    <div class="hero">
      <h1>📊 Order 總覽</h1>
      <div class="restaurant" id="titleLine"></div>
    </div>

    <div class="stats">
      <div class="stat green"><div class="num" id="statPeople">0</div><div class="label">人數</div></div>
      <div class="stat gold"><div class="num" id="statItems">0</div><div class="label">總件數</div></div>
      <div class="stat cyan"><div class="num" id="statTotal">$0</div><div class="label">總額</div></div>
    </div>

    <div class="card">
      <h2>📦 整合 Order（方便落單）</h2>
      <div id="consolidatedList"></div>
      <div style="margin-top:10px;padding:10px;border-radius:10px;background:rgba(255,201,77,.08);display:flex;justify-content:space-between">
        <span style="font-weight:700;color:var(--gold)">總計</span>
        <span id="grandTotal" style="font-weight:900;color:var(--gold)"></span>
      </div>
    </div>

    <div class="card">
      <h2>👥 各人 Order</h2>
      <div id="personList"></div>
    </div>

    <div class="actions">
      <button class="btn btn-secondary" onclick="copyOrder()">📋 複製 Order</button>
      <button class="btn btn-primary" onclick="showAutoFill()" id="autoFillBtn">🛒 自動填購物車</button>
      <button class="btn btn-danger" onclick="closeTreat()">🔒 截止</button>
    </div>

    <div id="autoFillSection" class="card" style="display:none;margin-top:14px;border-color:rgba(255,107,157,.3)">
      <h2>🛒 自動填 Foodpanda 購物車</h2>
      <p style="font-size:.82rem;color:var(--muted);margin-bottom:10px">1. 喺瀏覽器開 Foodpanda 餐廳頁 → 2. Click 下面個 bookmarklet → 3. 自動逐樣加落購物車</p>
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
        <a id="cartBookmarklet" href="javascript:void(0)" style="display:inline-block;padding:10px 16px;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-weight:800;font-size:.9rem;text-decoration:none;cursor:grab" onclick="event.preventDefault();alert('拖呢個按鈕去你嘅 Bookmark Bar，然後喺 Foodpanda 餐廳頁 click！')">🛒 自動加購物車</a>
        <button class="sample-chip" onclick="copyAutoFillCode()" style="border:1px solid var(--border);cursor:pointer">📋 複製 Code</button>
      </div>
      <div style="margin-top:10px;padding:10px;border-radius:10px;background:var(--card2)">
        <p style="font-size:.78rem;color:var(--gold)">⚠️ 注意：Bookmarklet 會嘗試根據項目名稱匹配 Foodpanda 菜單上嘅「+」按鈕。如果名稱唔完全 match，需要手動補。加完之後記得檢查購物車先付款。</p>
      </div>
      <div id="autoFillPreview" style="margin-top:10px"></div>
    </div>

    <p class="refresh-note">每 15 秒自動刷新</p>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
const tid=location.pathname.split('/summary/').pop()||location.pathname.split('/').pop();
let treat=null, refreshTimer=null;

function showToast(m){const el=document.getElementById('toast');el.textContent=m;el.classList.add('show');clearTimeout(showToast._t);showToast._t=setTimeout(()=>el.classList.remove('show'),2200);}

async function init(){
  try{
    const res=await fetch(`/tea-treat/api/treat/${tid}`);
    const data=await res.json();
    if(!data.ok)throw new Error(data.error);
    treat=data.treat;
    render();
    loadOrders();
    refreshTimer=setInterval(loadOrders,15000);
  }catch(e){
    document.getElementById('loading').textContent='❌ '+e.message;
  }
}

async function loadOrders(){
  try{
    const res=await fetch(`/tea-treat/api/orders/${tid}`,{cache:'no-store'});
    const data=await res.json();
    if(data.ok)renderOrders(data.orders||[]);
  }catch(e){}
}

function render(){
  document.getElementById('loading').style.display='none';
  document.getElementById('summaryPage').style.display='block';
  document.getElementById('titleLine').textContent=`${treat.title} · ${treat.restaurant}`;
}

function renderOrders(orders){
  // Stats
  document.getElementById('statPeople').textContent=orders.length;
  let totalItems=0, totalPrice=0;
  const itemMap={}; // name -> {qty, price, people}

  orders.forEach(o=>{
    (o.items||[]).forEach(it=>{
      totalItems+=it.qty;
      const price=parseFloat(it.price)||0;
      totalPrice+=price*it.qty;
      if(!itemMap[it.name])itemMap[it.name]={qty:0,price:0,people:[]};
      itemMap[it.name].qty+=it.qty;
      itemMap[it.name].price+=price*it.qty;
      if(!itemMap[it.name].people.includes(o.name))itemMap[it.name].people.push(o.name);
    });
  });

  document.getElementById('statItems').textContent=totalItems;
  document.getElementById('statTotal').textContent=`$${totalPrice.toFixed(0)}`;
  document.getElementById('grandTotal').textContent=`$${totalPrice.toFixed(0)} (${totalItems} 件)`;

  // Consolidated
  const consolEl=document.getElementById('consolidatedList');
  consolEl.innerHTML='';
  const sorted=Object.entries(itemMap).sort((a,b)=>b[1].qty-a[1].qty);
  sorted.forEach(([name,data])=>{
    const div=document.createElement('div');div.className='consolidated-item';
    div.innerHTML=`<div class="name">${name}</div><div class="detail"><span class="qty">×${data.qty}</span><span class="subtotal">$${data.price.toFixed(0)}</span></div>`;
    consolEl.appendChild(div);
  });
  if(!sorted.length)consolEl.innerHTML='<p style="color:var(--muted);font-size:.85rem;text-align:center;padding:12px">仲未有人落單</p>';

  // Per person
  const personEl=document.getElementById('personList');
  personEl.innerHTML='';
  orders.forEach(o=>{
    const div=document.createElement('div');div.className='person-card';
    let itemsHtml=(o.items||[]).map(it=>`<div class="person-item"><span class="pi-name">${it.name}</span><span class="pi-qty">×${it.qty}</span><span class="pi-price">$${(parseFloat(it.price||0)*it.qty).toFixed(0)}</span></div>`).join('');
    let personTotal=(o.items||[]).reduce((s,it)=>s+(parseFloat(it.price)||0)*it.qty,0);
    div.innerHTML=`<div class="person-head"><span class="person-name">${o.name}</span><span class="person-time">${o.ordered_at||''} · $${personTotal.toFixed(0)}</span></div><div class="person-items">${itemsHtml}</div>${o.remark?`<div class="person-remark">💬 ${o.remark}</div>`:''}`;
    personEl.appendChild(div);
  });
}

function copyOrder(){
  const items=document.querySelectorAll('.consolidated-item');
  let text=`🧋 ${treat.title} - ${treat.restaurant}\n📋 Order List\n${'─'.repeat(30)}\n`;
  items.forEach(el=>{
    const name=el.querySelector('.name').textContent;
    const qty=el.querySelector('.qty').textContent;
    const price=el.querySelector('.subtotal').textContent;
    text+=`${name} ${qty} ${price}\n`;
  });
  text+=`${'─'.repeat(30)}\n${document.getElementById('grandTotal').textContent}`;
  navigator.clipboard.writeText(text);
  showToast('已複製到剪貼簿 📋');
}

async function closeTreat(){
  if(!confirm('確定截止落單？截止後其他人唔可以再落單。'))return;
  try{
    await fetch(`/tea-treat/api/close/${tid}`,{method:'POST'});
    showToast('已截止落單 🔒');
  }catch(e){showToast('操作失敗');}
}

/* ---- Auto-fill Foodpanda Cart ---- */
function showAutoFill(){
  const sec=document.getElementById('autoFillSection');
  sec.style.display=sec.style.display==='none'?'block':'none';
}

function buildAutoFillBookmarklet(){
  // The bookmarklet fetches consolidated order from our API, then clicks + buttons on Foodpanda
  const apiUrl = `${location.origin}/tea-treat/api/consolidated/${tid}`;
  const code = `(async function(){
    var API_URL="${api_URL}";
    try{
      var resp=await fetch(API_URL);
      var data=await resp.json();
      if(!data.ok||!data.consolidated.length){alert('搵唔到 order data');return;}
      var items=data.consolidated;
      var total=0,matched=0,unmatched=[];
      
      // Find all product cards on the page
      var cards=document.querySelectorAll('[class*="product-card"],[class*="ProductCard"],[data-testid*="product"]');
      if(!cards.length){
        // Fallback: look for any element with item name and + button
        cards=[];
        document.querySelectorAll('li,article,[class*="menu-item"]').forEach(function(el){
          if(el.querySelector('button,[class*="plus"],[class*="add"]'))cards.push(el);
        });
      }
      
      for(var item of items){
        var found=false;
        var name=item.name.toLowerCase().trim();
        
        // Search through all cards for matching name
        for(var card of cards){
          var nameEl=card.querySelector('[class*="name"],[class*="title"],h3,h4,p,span');
          if(!nameEl)continue;
          var cardName=nameEl.innerText.toLowerCase().trim();
          
          // Flexible matching: exact, contains, or partial
          if(cardName===name||cardName.includes(name)||name.includes(cardName)){
            // Find the + / add button
            var btn=card.querySelector('button[class*="plus"],button[class*="add"],[class*="quantity"] button:last-child,[class*="counter"] button:last-child');
            if(!btn){
              // Fallback: find all buttons, pick the one with + or 加
              var btns=card.querySelectorAll('button');
              for(var b of btns){
                if(b.innerText.match(/^[+＋加]$/)||b.innerText.trim()==='+'){btn=b;break;}
              }
            }
            if(btn){
              for(var i=0;i<item.qty;i++){
                btn.click();
                total++;
              }
              matched++;
              found=true;
              break;
            }
          }
        }
        if(!found)unmatched.push(item.name);
      }
      
      var msg='已自動加 '+matched+'/'+items.length+' 種項目（共 '+total+' 件）到購物車！';
      if(unmatched.length)msg+='\\n\\n⚠️ 以下項目需要手動加：\\n'+unmatched.join('\\n');
      msg+='\\n\\n請檢查購物車確認先付款。';
      alert(msg);
    }catch(e){alert('Error: '+e.message);}
  })();`;
  return code.replace(/\\n/g,'\\\\n');
}

// Set bookmarklet href when data is ready
function updateAutoFillBookmarklet(){
  try{
    const apiUrl=`${location.origin}/tea-treat/api/consolidated/${tid}`;
    const code=`javascript:(async function(){try{var r=await fetch("${apiUrl}");var d=await r.json();if(!d.ok||!d.consolidated.length){alert("搵唔到 order data");return;}var items=d.consolidated;var total=0,matched=0,unmatched=[];var cards=document.querySelectorAll("[class*=product-card],[class*=ProductCard],[data-testid*=product]");if(!cards.length){cards=[];document.querySelectorAll("li,article,[class*=menu-item]").forEach(function(el){if(el.querySelector("button,[class*=plus],[class*=add]"))cards.push(el);});}for(var item of items){var found=false;var name=item.name.toLowerCase().trim();for(var card of cards){var nameEl=card.querySelector("[class*=name],[class*=title],h3,h4,p,span");if(!nameEl)continue;var cardName=nameEl.innerText.toLowerCase().trim();if(cardName===name||cardName.includes(name)||name.includes(cardName)){var btn=card.querySelector("button[class*=plus],button[class*=add],[class*=quantity] button:last-child,[class*=counter] button:last-child");if(!btn){var btns=card.querySelectorAll("button");for(var b of btns){if(b.innerText.match(/^[+＋加]$/)||b.innerText.trim()==="+"){btn=b;break;}}}if(btn){for(var i=0;i<item.qty;i++){btn.click();total++;}matched++;found=true;break;}}}if(!found)unmatched.push(item.name);}var msg="已自動加 "+matched+"/"+items.length+" 種項目（共 "+total+" 件）到購物車！";if(unmatched.length)msg+="\\n\\n⚠️ 以下項目需要手動加：\\n"+unmatched.join("\\n");msg+="\\n\\n請檢查購物車確認先付款。";alert(msg);}catch(e){alert("Error: "+e.message);}})();`;
    document.getElementById('cartBookmarklet').href=code;
  }catch(e){}
}

function copyAutoFillCode(){
  const el=document.getElementById('cartBookmarklet');
  navigator.clipboard.writeText(el.href);
  showToast('Bookmarklet code 已複製！新增 bookmark 貼上去');
}

// Init bookmarklet when orders load
const origRenderOrders=renderOrders;
renderOrders=function(orders){
  origRenderOrders(orders);
  updateAutoFillBookmarklet();
  // Show preview
  const preview=document.getElementById('autoFillPreview');
  if(orders.length){
    preview.innerHTML='<p style="font-size:.82rem;color:var(--muted)">📋 會自動加以下項目到購物車：</p>' +
      orders.map(o=>'<div style="font-size:.8rem;color:var(--text);margin:2px 0">'+o.name+': '+(o.items||[]).map(i=>i.name+' ×'+i.qty).join(', ')+'</div>').join('');
  }
};

init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-Hant-HK">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>投資報告 | ClawHub</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a12;--card:#12121e;--border:rgba(255,255,255,.08);--accent:#ff3ea5;--cyan:#33e6ff;--green:#00e676;--red:#ff5252;--muted:#888;--text:#eee}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.container{max-width:800px;margin:0 auto;padding:24px 16px}
h1{text-align:center;font-size:1.6rem;margin-bottom:8px;background:linear-gradient(135deg,var(--accent),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.subtitle{text-align:center;color:var(--muted);font-size:.85rem;margin-bottom:32px}

.search-box{display:flex;gap:10px;margin-bottom:24px}
.search-box input{flex:1;padding:14px 18px;border-radius:12px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:1rem;outline:none;transition:border .2s}
.search-box input:focus{border-color:var(--accent)}
.search-box input::placeholder{color:var(--muted)}
.search-box button{padding:14px 28px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--accent),#e040a0);color:#fff;font-size:1rem;font-weight:700;cursor:pointer;transition:opacity .2s;white-space:nowrap}
.search-box button:hover{opacity:.85}
.search-box button:disabled{opacity:.4;cursor:not-allowed}

.examples{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:28px}
.examples span{font-size:.78rem;color:var(--muted);padding:6px 12px;border-radius:20px;border:1px solid var(--border);cursor:pointer;transition:all .2s}
.examples span:hover{border-color:var(--accent);color:var(--accent)}

.status{text-align:center;color:var(--cyan);font-size:.9rem;margin:20px 0;display:none}
.status.show{display:block}

.result{display:none}
.result.show{display:block}

.stock-header{display:flex;align-items:center;gap:16px;padding:20px;border-radius:16px;background:var(--card);border:1px solid var(--border);margin-bottom:20px}
.stock-header .ticker{font-size:1.4rem;font-weight:900;color:var(--accent)}
.stock-header .name{font-size:1rem;color:var(--text)}
.stock-header .meta{font-size:.8rem;color:var(--muted);margin-top:4px}

.metrics{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-bottom:24px}
.metric{padding:14px;border-radius:12px;background:var(--card);border:1px solid var(--border);text-align:center}
.metric .label{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.metric .value{font-size:1.1rem;font-weight:700}
.metric .value.up{color:var(--green)}
.metric .value.down{color:var(--red)}

.report-card{padding:24px;border-radius:16px;background:var(--card);border:1px solid var(--border);line-height:1.8;font-size:.95rem;white-space:pre-wrap}
.report-card h2,.report-card h3{color:var(--accent);margin:16px 0 8px}
.footer{text-align:center;color:var(--muted);font-size:.75rem;margin-top:32px;padding:16px}
</style>
</head>
<body>
<div class="container">
  <h1>📊 AI 投資報告</h1>
  <p class="subtitle">輸入股票代號或名稱，即時生成專業投資分析報告</p>

  <div class="search-box">
    <input id="tickerInput" type="text" placeholder="例如：AAPL、0700.HK、騰訊、比亞迪、TSLA..." autofocus>
    <button id="analyzeBtn" onclick="analyze()">分析</button>
  </div>

  <div class="examples">
    <span onclick="setTicker('AAPL')">🍎 Apple</span>
    <span onclick="setTicker('0700.HK')">騰訊</span>
    <span onclick="setTicker('1810.HK')">小米</span>
    <span onclick="setTicker('1211.HK')">比亞迪</span>
    <span onclick="setTicker('NVDA')">NVIDIA</span>
    <span onclick="setTicker('TSLA')">Tesla</span>
    <span onclick="setTicker('9988.HK')">阿里</span>
    <span onclick="setTicker('3690.HK')">美團</span>
  </div>

  <div id="status" class="status"></div>

  <div id="result" class="result">
    <div class="stock-header">
      <div>
        <div class="ticker" id="resTicker"></div>
        <div class="name" id="resName"></div>
        <div class="meta" id="resMeta"></div>
      </div>
    </div>
    <div class="metrics" id="metricsGrid"></div>
    <div class="report-card" id="reportContent"></div>
  </div>

  <div class="footer">Powered by MiMo v2 Pro · Data from Yahoo Finance · Not financial advice</div>
</div>

<script>
const $ = id => document.getElementById(id);
const input = $('tickerInput');
const btn = $('analyzeBtn');
const status = $('status');
const result = $('result');

input.addEventListener('keydown', e => {
  if (e.key === 'Enter') analyze();
});

function setTicker(t) {
  input.value = t;
  analyze();
}

function fmtNum(n) {
  if (n == null) return 'N/A';
  if (Math.abs(n) >= 1e12) return (n/1e12).toFixed(1) + '萬億';
  if (Math.abs(n) >= 1e8) return (n/1e8).toFixed(1) + '億';
  if (Math.abs(n) >= 1e4) return (n/1e4).toFixed(1) + '萬';
  return n.toLocaleString();
}

async function analyze() {
  const query = input.value.trim();
  if (!query) return;

  btn.disabled = true;
  status.textContent = '🔍 正在獲取股票數據...';
  status.className = 'status show';
  result.className = 'result';

  try {
    const res = await fetch('/stock-report/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ticker: query })
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || '分析失敗');

    // Header
    $('resTicker').textContent = data.ticker;
    $('resName').textContent = data.company_name;
    const d = data.data || {};
    $('resMeta').textContent = `${d.currency || ''} · 更新: ${data.fetch_time || ''}`;

    // Metrics
    const grid = $('metricsGrid');
    grid.innerHTML = '';
    const items = [
      { label: '現價', value: d.current_price ? `${d.current_price} ${d.currency}` : 'N/A' },
      { label: '市值', value: fmtNum(d.market_cap) },
      { label: '市盈率', value: d.pe_ratio ? d.pe_ratio.toFixed(2) : 'N/A' },
    ];
    items.forEach(m => {
      grid.innerHTML += `<div class="metric"><div class="label">${m.label}</div><div class="value">${m.value}</div></div>`;
    });

    // Report
    $('reportContent').textContent = data.report;
    result.className = 'result show';
    status.className = 'status';
  } catch (err) {
    status.textContent = '❌ ' + err.message;
    status.style.color = '#ff5252';
  } finally {
    btn.disabled = false;
  }
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<title>巴士 ETA | Citybus + 九巴</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
:root{--bg:#08111f;--panel:#0f172a;--line:rgba(255,255,255,.08);--text:#e5e7eb;--muted:#94a3b8;--accent:#f97316;--pink:#ec4899;--gold:#fbbf24;--green:#86efac;--cyan:#33e6ff;--red:#fca5a5;--kmb:#65afff;--ctb:#f97316}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);padding:6px;min-height:100vh;background-image:radial-gradient(circle at top right,rgba(236,72,153,.08),transparent 25%),radial-gradient(circle at top left,rgba(249,115,22,.08),transparent 28%)}
.app{max-width:760px;margin:0 auto}

/* Search bar */
.search-bar{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:10px 12px;display:flex;gap:8px;align-items:center;margin-bottom:10px}
.search-bar input{background:#0a1020;color:var(--text);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:9px 10px;font-size:.9rem;outline:none;transition:border .2s}
.search-bar input:focus{border-color:var(--accent)}
.search-bar input.route-input{width:65px;font-weight:800;text-align:center;font-size:1rem}
.search-bar input.stop-input{flex:1;min-width:0}
.search-bar .search-label{color:var(--muted);font-size:.65rem;display:flex;flex-direction:column;gap:2px}
.search-bar button{border:none;border-radius:8px;padding:9px 12px;font-size:.85rem;font-weight:700;color:#fff;background:linear-gradient(135deg,var(--accent),var(--pink));cursor:pointer;white-space:nowrap;flex-shrink:0}
.search-bar button:disabled{opacity:.5}
.search-bar .icon-btn{background:rgba(255,255,255,.06);color:var(--muted);padding:9px;font-size:.95rem;border-radius:8px;border:none;cursor:pointer}

/* Bookmarks */
.bookmarks{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:8px 10px;margin-bottom:10px}
.bm-scroll{display:flex;gap:6px;overflow-x:auto}
.bm-chip{display:inline-flex;align-items:center;gap:5px;white-space:nowrap;background:rgba(249,115,22,.08);border:1px solid rgba(249,115,22,.12);border-radius:999px;padding:6px 10px;flex:0 0 auto;cursor:pointer;font-size:.78rem;font-weight:600;color:var(--text);transition:all .2s}
.bm-chip:hover{background:rgba(249,115,22,.15)}
.bm-chip .badge{padding:2px 5px;border-radius:5px;font-size:.65rem;font-weight:800}
.bm-chip .badge.kmb{background:rgba(101,175,255,.15);color:var(--kmb)}
.bm-chip .badge.ctb{background:rgba(249,115,22,.15);color:var(--ctb)}

/* Operator badge */
.op-badge{display:inline-block;padding:2px 6px;border-radius:5px;font-size:.65rem;font-weight:800;vertical-align:middle;margin-left:4px}
.op-kmb{background:rgba(101,175,255,.15);color:var(--kmb)}
.op-ctb{background:rgba(249,115,22,.15);color:var(--ctb)}

/* Timer */
.timer{position:fixed;bottom:60px;left:16px;background:rgba(15,23,42,.94);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:8px 12px;display:flex;align-items:center;gap:8px;z-index:299;box-shadow:0 6px 20px rgba(0,0,0,.3)}
.timer.hidden{display:none}
.timer-ring{position:relative;width:32px;height:32px;flex-shrink:0}
.timer-ring svg{position:absolute;inset:0;transform:rotate(-90deg)}
.timer-ring .num{font-size:.85rem;font-weight:900;color:#33e6ff;z-index:1;position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.timer-label{color:#94a3b8;font-size:.72rem}
.timer-pulse{animation:tp 1s ease infinite}
@keyframes tp{0%,100%{opacity:1}50%{opacity:.4}}

/* Status */
.status{text-align:center;color:var(--muted);font-size:.8rem;margin-bottom:8px}
.status .dot{display:inline-block;width:7px;height:7px;background:var(--green);border-radius:50%;margin-right:4px;vertical-align:middle;animation:lp 2s ease infinite}
@keyframes lp{0%,100%{box-shadow:0 0 0 0 rgba(134,239,172,.5)}50%{box-shadow:0 0 0 5px rgba(134,239,172,0)}}

/* ETA cards */
.eta-list{display:flex;flex-direction:column;gap:8px}
.eta-card{background:linear-gradient(135deg,rgba(255,255,255,.03),rgba(255,255,255,.01));border:1px solid var(--line);border-radius:14px;padding:14px;position:relative;overflow:hidden;animation:ci .4s ease}
@keyframes ci{from{opacity:0;transform:translateY(10px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.eta-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.eta-card:first-child::before{background:var(--green)}
.eta-card:nth-child(2)::before{background:var(--gold)}
.eta-card:nth-child(3)::before{background:var(--accent)}
.eta-card.first{border-color:rgba(134,239,172,.15);background:linear-gradient(135deg,rgba(0,230,118,.03),transparent)}
.eta-row{display:flex;justify-content:space-between;align-items:center}
.eta-time{font-size:1.7rem;font-weight:900;letter-spacing:-.02em}
.eta-card.first .eta-time{background:linear-gradient(135deg,var(--green),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.eta-card:not(.first) .eta-time{background:linear-gradient(135deg,var(--gold),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.eta-box{text-align:right}
.eta-mins{font-size:1.3rem;font-weight:900;color:var(--green)}
.eta-mins.urgent{color:var(--accent);animation:up 1s ease infinite}
@keyframes up{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
.eta-mins-label{color:var(--muted);font-size:.68rem}
.eta-dest{margin-top:4px;color:var(--muted);font-size:.78rem;display:flex;align-items:center;gap:6px}
.eta-remark{margin-top:4px;font-size:.75rem;color:var(--gold);background:rgba(251,191,36,.08);border-radius:6px;padding:3px 7px;display:inline-block}
.eta-progress{height:3px;background:rgba(255,255,255,.04);border-radius:4px;margin-top:8px;overflow:hidden}
.eta-progress-fill{height:100%;border-radius:4px;transition:width 1s linear}
.eta-card.first .eta-progress-fill{background:linear-gradient(90deg,var(--green),var(--cyan))}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(3,7,18,.75);display:none;align-items:center;justify-content:center;z-index:100;padding:12px}
.modal-bg.show{display:flex}
.modal{width:min(600px,100%);max-height:80vh;overflow:auto;background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:16px}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;position:sticky;top:0;background:var(--panel);padding-bottom:8px;z-index:2}
.modal-head h2{font-size:1rem;font-weight:700}
.modal button.ghost{background:transparent;border:1px solid rgba(255,255,255,.1);color:var(--muted);border-radius:8px;padding:7px 12px;font-size:.82rem;cursor:pointer}
.modal label{display:block;color:var(--muted);font-size:.78rem;margin:8px 0 3px}
.modal input,.modal select{width:100%;background:#0a1020;color:var(--text);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:9px 10px;font-size:.88rem;outline:none}
.modal .row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.modal .actions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.modal .actions button{border:none;border-radius:999px;padding:9px 13px;font-size:.85rem;font-weight:700;cursor:pointer;color:#fff;background:linear-gradient(135deg,var(--accent),var(--pink))}
.modal .actions button.sec{background:#243146;color:var(--text)}
.stop-card{background:var(--panel-2,#172033);border:1px solid var(--line);border-radius:12px;padding:10px;margin-bottom:6px}
.stop-title{font-weight:700;font-size:.88rem}
.stop-sub{margin-top:3px;color:var(--muted);font-size:.76rem}
.stop-actions{display:flex;gap:5px;margin-top:7px}
.stop-actions button{flex:1;border:none;border-radius:8px;padding:7px;font-size:.8rem;font-weight:600;cursor:pointer;color:#fff;background:linear-gradient(135deg,var(--accent),var(--pink))}
.stop-actions button.sec{background:#243146;color:var(--text)}

.toast{position:fixed;left:50%;bottom:16px;transform:translateX(-50%);background:var(--panel);border:1px solid var(--line);color:var(--text);border-radius:999px;padding:7px 13px;font-size:.82rem;z-index:300;display:none}
.toast.show{display:block}
@media(max-width:500px){.search-bar{flex-wrap:wrap}.search-bar input.route-input{width:55px}.search-bar input.stop-input{width:100%}.modal{width:100%;max-height:84vh}.modal .row{grid-template-columns:1fr}}

.loading-overlay{position:fixed;bottom:16px;left:16px;background:rgba(15,23,42,.96);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:10px 14px;display:flex;align-items:center;gap:10px;z-index:300;box-shadow:0 8px 24px rgba(0,0,0,.4);transition:opacity .3s}
.loading-overlay.hidden{display:none}
.loading-spinner{width:20px;height:20px;border:2px solid rgba(255,255,255,.1);border-top-color:#33e6ff;border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{color:#33e6ff;font-size:.82rem;font-weight:600}
.loading-sub{color:#94a3b8;font-size:.72rem;margin-top:1px}


/* Bus Bot Chat */
.busbot-toggle{position:fixed;bottom:16px;right:16px;z-index:50;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#33e6ff,#ff6b9d);border:none;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;font-size:1.5rem;transition:transform .2s}
.busbot-toggle:hover{transform:scale(1.1)}
.busbot-panel{position:fixed;bottom:80px;right:16px;z-index:51;width:min(380px,calc(100vw - 32px));height:500px;background:#0f172a;border:1px solid rgba(255,255,255,.08);border-radius:20px;display:none;flex-direction:column;overflow:hidden;box-shadow:0 10px 40px rgba(0,0,0,.5)}
.busbot-panel.show{display:flex}
.busbot-head{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.08)}
.busbot-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem}
.busbot-info{flex:1}.busbot-name{font-weight:700;font-size:.9rem}.busbot-status{font-size:.7rem;color:#86efac}
.busbot-close{background:none;border:none;color:#94a3b8;font-size:1.2rem;cursor:pointer}
.busbot-messages{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px}
.busbot-msg{max-width:85%;padding:10px 14px;border-radius:14px;font-size:.88rem;line-height:1.5}
.busbot-msg.bot{background:rgba(51,232,255,.08);align-self:flex-start;border-bottom-left-radius:4px}
.busbot-msg.user{background:rgba(255,107,157,.12);align-self:flex-end;border-bottom-right-radius:4px}
.busbot-input-area{display:flex;gap:8px;padding:10px 12px;border-top:1px solid rgba(255,255,255,.08)}
.busbot-input-area input{flex:1;background:#0a1020;color:#e5e7eb;border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:10px 14px;font-size:.9rem;outline:none}
.busbot-input-area input:focus{border-color:#33e6ff}
.busbot-input-area button{background:linear-gradient(135deg,#33e6ff,#ff6b9d);border:none;border-radius:12px;padding:10px 14px;color:#fff;font-weight:700;cursor:pointer}
.busbot-typing{display:flex;gap:4px;padding:10px 14px;align-self:flex-start}
.busbot-typing span{width:6px;height:6px;border-radius:50%;background:#94a3b8;animation:bt 1.4s infinite}
.busbot-typing span:nth-child(2){animation-delay:.2s}
.busbot-typing span:nth-child(3){animation-delay:.4s}
@keyframes bt{0%,60%,100%{opacity:.3}30%{opacity:1}}
</style>
</head>
<body>
<div class="app">
  <div class="search-bar">
    <div class="search-label"><span style="font-size:.6rem">路線</span><input id="routeNo" class="route-input" value="722"></div>
    <div class="search-label" style="flex:1;min-width:0"><span style="font-size:.6rem">Stop ID / 站名</span><input id="stopId" class="stop-input" value="001272" placeholder="001272 或站名"></div>
    <button id="checkBtn" onclick="openEta()">🔍</button>
    <button class="icon-btn" onclick="openSearch()">⚙️</button>
  </div>

  <div class="bookmarks"><div id="bmList" class="bm-scroll"></div></div>

  <div id="timer" class="timer hidden">
    <div class="timer-ring">
      <svg width="32" height="32" viewBox="0 0 32 32"><circle cx="16" cy="16" r="13" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="2.5"/><circle id="tArc" cx="16" cy="16" r="13" fill="none" stroke="#33e6ff" stroke-width="2.5" stroke-dasharray="81.68" stroke-dashoffset="0" stroke-linecap="round"/></svg>
      <span id="tNum" class="num">10</span>
    </div>
    <span class="timer-label">秒後更新</span>
  </div>

  <div id="status" class="status"></div>
  <div id="etaList" class="eta-list"></div>
  <div id="error" style="color:var(--red);font-size:.82rem;text-align:center;margin-top:6px"></div>
</div>

<!-- Search Modal -->
<div id="searchModal" class="modal-bg">
  <div class="modal">
    <div class="modal-head">
      <h2 id="sTitle">🔍 搜尋巴士路線</h2>
      <button class="ghost" onclick="closeSearch()">✕</button>
    </div>

    <!-- Step 1: Enter route -->
    <div id="step1">
      <label>輸入巴士路線</label>
      <input id="sRoute" value="" placeholder="例如：722 / 6 / 101 / 113" style="font-size:1.2rem;font-weight:800;text-align:center;padding:14px">
      <div class="actions" style="margin-top:12px">
        <button onclick="findRoute()" style="flex:1">🔍 搜尋路線</button>
      </div>
      <div id="sStatus1" class="status" style="margin-top:8px"></div>
    </div>

    <!-- Step 2: Pick direction -->
    <div id="step2" style="display:none">
      <p style="font-size:.85rem;margin-bottom:12px">路線 <b id="sRouteLabel" style="color:var(--cyan)"></b> 有以下方向：</p>
      <div id="dirList" style="display:flex;flex-direction:column;gap:8px"></div>
      <button class="ghost" style="margin-top:12px" onclick="goStep(1)">← 重新搜尋</button>
    </div>

    <!-- Step 3: Pick stop -->
    <div id="step3" style="display:none">
      <div id="step3Loading" style="text-align:center;padding:30px">
        <div style="width:40px;height:40px;border:3px solid rgba(255,255,255,.08);border-top-color:#33e6ff;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px"></div>
        <div style="color:#33e6ff;font-size:.9rem;font-weight:600">載入站位中...</div>
        <div style="color:#94a3b8;font-size:.78rem;margin-top:4px">同時查詢九巴同城巴</div>
      </div>
      <div id="step3Content" style="display:none">
        <p style="font-size:.85rem;margin-bottom:8px">
          <b id="sDirLabel" style="color:#33e6ff"></b> · <span id="sRouteLabel2"></span>
        </p>
        <input id="sFilter" placeholder="篩選站名…（例如：鰂魚涌、英皇道）" style="margin-bottom:10px">
        <div id="stopList" style="max-height:50vh;overflow-y:auto"></div>
        <button class="ghost" style="margin-top:10px" onclick="goStep(2)">← 重新揀方向</button>
      </div>
    </div>
  </div>
</div>

<div id="loadingOverlay" class="loading-overlay hidden">
  <div class="loading-spinner"></div>
  <div class="loading-text" id="loadingText">搜尋中...</div>
  <div class="loading-sub" id="loadingSub"></div>
</div>
<!-- Bus Bot Chat -->
<button class="busbot-toggle" id="busbotToggle" title="問巴膠仔">🧑‍✈️</button>
<div class="busbot-panel" id="busbotPanel">
  <div class="busbot-head">
    <div class="busbot-avatar" style="background:linear-gradient(135deg,#ffc94d,#ff6b9d)">🧑‍✈️</div>
    <div class="busbot-info"><div class="busbot-name">巴膠仔</div><div class="busbot-status">🟢 在線 · 巴士路線助手</div></div>
    <button class="busbot-close" onclick="toggleBot()">✕</button>
  </div>
  <div class="busbot-messages" id="busbotMsgs"><div class="busbot-msg bot">嗨～我係巴膠仔🚌 有咩巴士問題隨時問我！</div></div>
  <div class="busbot-input-area"><input id="busbotInput" placeholder="問我巴士問題..." /><button onclick="sendBotMsg()">發送</button></div>
</div>
<div id="toast" class="toast"></div>

<script>
var refreshTimer=null,cdTimer=null,cdVal=10;
var BK='citybus_eta_bk_v7';
var memoryBK=[];

function showToast(m){var e=document.getElementById('toast');e.textContent=m;e.classList.add('show');clearTimeout(showToast._t);showToast._t=setTimeout(()=>e.classList.remove('show'),2200);}

function getBK(){try{if(!storageOK())return memoryBK;var r=localStorage.getItem(BK);return r?JSON.parse(r):[];}catch{return memoryBK;}}
function saveBK(l){try{if(!storageOK()){memoryBK=l;return;}localStorage.setItem(BK,JSON.stringify(l));}catch{memoryBK=l;}}
function storageOK(){try{localStorage.setItem('__t','1');localStorage.removeItem('__t');return true;}catch{return false;}}
function addBK(it){var bk=getBK();if(bk.some(b=>b.route===it.route&&b.stop_id===it.stop_id&&b.co===it.co)){showToast('已存在');return false;}saveBK([it,...bk].sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0)));
    
/* ---- Bus Bot Chat ---- */
var botHistory=[{role:'assistant',content:'嗨～我係巴膠仔🚌 有咩巴士問題隨時問我！'}];
function toggleBot(){document.getElementById('busbotPanel').classList.toggle('show')}
document.getElementById('busbotToggle').onclick=toggleBot;
document.getElementById('busbotInput').onkeydown=function(e){if(e.key==='Enter')sendBotMsg()};
async function sendBotMsg(){
  var inp=document.getElementById('busbotInput'),text=inp.value.trim();
  if(!text)return;inp.value='';addBotMsg('user',text);botHistory.push({role:'user',content:text});
  var msgs=document.getElementById('busbotMsgs'),t=document.createElement('div');
  t.className='busbot-typing';t.innerHTML='<span></span><span></span><span></span>';msgs.appendChild(t);msgs.scrollTop=9e9;
  try{
    var r=await fetch('/busbot-api/message',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:botHistory})});
    var d=await r.json();t.remove();
    if(d.ok){addBotMsg('bot',d.reply);botHistory.push({role:'assistant',content:d.reply})}
    else addBotMsg('bot','😅 Error: '+(d.error||'unknown'))
  }catch(e){t.remove();addBotMsg('bot','Network error')}
}
function addBotMsg(role,text){
  var m=document.getElementById('busbotMsgs'),d=document.createElement('div');
  d.className='busbot-msg '+(role==='user'?'user':'bot');d.textContent=text;m.appendChild(d);m.scrollTop=9e9;
}

renderBK();
    showToast("已收藏");
    return true;
}

</script>
</body>
</html>

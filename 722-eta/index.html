<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<title>巴士 ETA | Citybus + 九巴</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
:root{--bg:#08111f;--panel:#0f172a;--line:rgba(255,255,255,.08);--text:#e5e7eb;--muted:#94a3b8;--accent:#f97316;--pink:#ec4899;--gold:#fbbf24;--green:#86efac;--cyan:#33e6ff;--red:#fca5a5;--kmb:#65afff;--ctb:#f97316}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);padding:6px;min-height:100vh;background-image:radial-gradient(circle at top right,rgba(236,72,153,.08),transparent 25%),radial-gradient(circle at top left,rgba(249,115,22,.08),transparent 28%)}
.app{max-width:760px;margin:0 auto}

/* Search bar */
.search-bar{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:10px 12px;display:flex;gap:8px;align-items:center;margin-bottom:10px}
.search-bar input{background:#0a1020;color:var(--text);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:9px 10px;font-size:.9rem;outline:none;transition:border .2s}
.search-bar input:focus{border-color:var(--accent)}
.search-bar input.route-input{width:65px;font-weight:800;text-align:center;font-size:1rem}
.search-bar input.stop-input{flex:1;min-width:0}
.search-bar .search-label{color:var(--muted);font-size:.65rem;display:flex;flex-direction:column;gap:2px}
.search-bar button{border:none;border-radius:8px;padding:9px 12px;font-size:.85rem;font-weight:700;color:#fff;background:linear-gradient(135deg,var(--accent),var(--pink));cursor:pointer;white-space:nowrap;flex-shrink:0}
.search-bar button:disabled{opacity:.5}
.search-bar .icon-btn{background:rgba(255,255,255,.06);color:var(--muted);padding:9px;font-size:.95rem;border-radius:8px;border:none;cursor:pointer}

/* Bookmarks */
.bookmarks{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:8px 10px;margin-bottom:10px}
.bm-scroll{display:flex;gap:6px;overflow-x:auto}
.bm-chip{display:inline-flex;align-items:center;gap:5px;white-space:nowrap;background:rgba(249,115,22,.08);border:1px solid rgba(249,115,22,.12);border-radius:999px;padding:6px 10px;flex:0 0 auto;cursor:pointer;font-size:.78rem;font-weight:600;color:var(--text);transition:all .2s}
.bm-chip:hover{background:rgba(249,115,22,.15)}
.bm-chip .badge{padding:2px 5px;border-radius:5px;font-size:.65rem;font-weight:800}
.bm-chip .badge.kmb{background:rgba(101,175,255,.15);color:var(--kmb)}
.bm-chip .badge.ctb{background:rgba(249,115,22,.15);color:var(--ctb)}

/* Operator badge */
.op-badge{display:inline-block;padding:2px 6px;border-radius:5px;font-size:.65rem;font-weight:800;vertical-align:middle;margin-left:4px}
.op-kmb{background:rgba(101,175,255,.15);color:var(--kmb)}
.op-ctb{background:rgba(249,115,22,.15);color:var(--ctb)}

/* Timer */
.timer{text-align:center;padding:6px 0;margin-bottom:4px}
.timer.hidden{display:none}
.timer-ring{display:inline-flex;align-items:center;justify-content:center;position:relative;width:64px;height:64px}
.timer-ring svg{position:absolute;inset:0;transform:rotate(-90deg)}
.timer-ring .num{font-size:1.3rem;font-weight:900;color:var(--cyan);z-index:1}
.timer-label{color:var(--muted);font-size:.7rem;margin-top:1px}
.timer-pulse{animation:tp 1s ease infinite}
@keyframes tp{0%,100%{opacity:1}50%{opacity:.4}}

/* Status */
.status{text-align:center;color:var(--muted);font-size:.8rem;margin-bottom:8px}
.status .dot{display:inline-block;width:7px;height:7px;background:var(--green);border-radius:50%;margin-right:4px;vertical-align:middle;animation:lp 2s ease infinite}
@keyframes lp{0%,100%{box-shadow:0 0 0 0 rgba(134,239,172,.5)}50%{box-shadow:0 0 0 5px rgba(134,239,172,0)}}

/* ETA cards */
.eta-list{display:flex;flex-direction:column;gap:8px}
.eta-card{background:linear-gradient(135deg,rgba(255,255,255,.03),rgba(255,255,255,.01));border:1px solid var(--line);border-radius:14px;padding:14px;position:relative;overflow:hidden;animation:ci .4s ease}
@keyframes ci{from{opacity:0;transform:translateY(10px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.eta-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.eta-card:first-child::before{background:var(--green)}
.eta-card:nth-child(2)::before{background:var(--gold)}
.eta-card:nth-child(3)::before{background:var(--accent)}
.eta-card.first{border-color:rgba(134,239,172,.15);background:linear-gradient(135deg,rgba(0,230,118,.03),transparent)}
.eta-row{display:flex;justify-content:space-between;align-items:center}
.eta-time{font-size:1.7rem;font-weight:900;letter-spacing:-.02em}
.eta-card.first .eta-time{background:linear-gradient(135deg,var(--green),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.eta-card:not(.first) .eta-time{background:linear-gradient(135deg,var(--gold),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.eta-box{text-align:right}
.eta-mins{font-size:1.3rem;font-weight:900;color:var(--green)}
.eta-mins.urgent{color:var(--accent);animation:up 1s ease infinite}
@keyframes up{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
.eta-mins-label{color:var(--muted);font-size:.68rem}
.eta-dest{margin-top:4px;color:var(--muted);font-size:.78rem;display:flex;align-items:center;gap:6px}
.eta-remark{margin-top:4px;font-size:.75rem;color:var(--gold);background:rgba(251,191,36,.08);border-radius:6px;padding:3px 7px;display:inline-block}
.eta-progress{height:3px;background:rgba(255,255,255,.04);border-radius:4px;margin-top:8px;overflow:hidden}
.eta-progress-fill{height:100%;border-radius:4px;transition:width 1s linear}
.eta-card.first .eta-progress-fill{background:linear-gradient(90deg,var(--green),var(--cyan))}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(3,7,18,.75);display:none;align-items:center;justify-content:center;z-index:100;padding:12px}
.modal-bg.show{display:flex}
.modal{width:min(600px,100%);max-height:80vh;overflow:auto;background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:16px}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;position:sticky;top:0;background:var(--panel);padding-bottom:8px;z-index:2}
.modal-head h2{font-size:1rem;font-weight:700}
.modal button.ghost{background:transparent;border:1px solid rgba(255,255,255,.1);color:var(--muted);border-radius:8px;padding:7px 12px;font-size:.82rem;cursor:pointer}
.modal label{display:block;color:var(--muted);font-size:.78rem;margin:8px 0 3px}
.modal input,.modal select{width:100%;background:#0a1020;color:var(--text);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:9px 10px;font-size:.88rem;outline:none}
.modal .row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.modal .actions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.modal .actions button{border:none;border-radius:999px;padding:9px 13px;font-size:.85rem;font-weight:700;cursor:pointer;color:#fff;background:linear-gradient(135deg,var(--accent),var(--pink))}
.modal .actions button.sec{background:#243146;color:var(--text)}
.stop-card{background:var(--panel-2,#172033);border:1px solid var(--line);border-radius:12px;padding:10px;margin-bottom:6px}
.stop-title{font-weight:700;font-size:.88rem}
.stop-sub{margin-top:3px;color:var(--muted);font-size:.76rem}
.stop-actions{display:flex;gap:5px;margin-top:7px}
.stop-actions button{flex:1;border:none;border-radius:8px;padding:7px;font-size:.8rem;font-weight:600;cursor:pointer;color:#fff;background:linear-gradient(135deg,var(--accent),var(--pink))}
.stop-actions button.sec{background:#243146;color:var(--text)}

.toast{position:fixed;left:50%;bottom:16px;transform:translateX(-50%);background:var(--panel);border:1px solid var(--line);color:var(--text);border-radius:999px;padding:7px 13px;font-size:.82rem;z-index:300;display:none}
.toast.show{display:block}
@media(max-width:500px){.search-bar{flex-wrap:wrap}.search-bar input.route-input{width:55px}.search-bar input.stop-input{width:100%}.modal{width:100%;max-height:84vh}.modal .row{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
  <div class="search-bar">
    <div class="search-label"><span style="font-size:.6rem">路線</span><input id="routeNo" class="route-input" value="722"></div>
    <div class="search-label" style="flex:1;min-width:0"><span style="font-size:.6rem">Stop ID / 站名</span><input id="stopId" class="stop-input" value="001272" placeholder="001272 或站名"></div>
    <button id="checkBtn" onclick="openEta()">🔍</button>
    <button class="icon-btn" onclick="openSearch()">⚙️</button>
  </div>

  <div class="bookmarks"><div id="bmList" class="bm-scroll"></div></div>

  <div id="timer" class="timer hidden">
    <div class="timer-ring">
      <svg width="64" height="64" viewBox="0 0 64 64"><circle cx="32" cy="32" r="28" fill="none" stroke="rgba(255,255,255,.06)" stroke-width="3"/><circle id="tArc" cx="32" cy="32" r="28" fill="none" stroke="var(--cyan)" stroke-width="3" stroke-dasharray="175.9" stroke-dashoffset="0" stroke-linecap="round"/></svg>
      <span id="tNum" class="num">10</span>
    </div>
    <div class="timer-label">秒後更新</div>
  </div>

  <div id="status" class="status"></div>
  <div id="etaList" class="eta-list"></div>
  <div id="error" style="color:var(--red);font-size:.82rem;text-align:center;margin-top:6px"></div>
</div>

<!-- Search Modal -->
<div id="searchModal" class="modal-bg">
  <div class="modal">
    <div class="modal-head">
      <h2 id="sTitle">🔍 搜尋巴士路線</h2>
      <button class="ghost" onclick="closeSearch()">✕</button>
    </div>

    <!-- Step 1: Enter route -->
    <div id="step1">
      <label>輸入巴士路線</label>
      <input id="sRoute" value="" placeholder="例如：722 / 6 / 101 / 113" style="font-size:1.2rem;font-weight:800;text-align:center;padding:14px">
      <div class="actions" style="margin-top:12px">
        <button onclick="findRoute()" style="flex:1">🔍 搜尋路線</button>
      </div>
      <div id="sStatus1" class="status" style="margin-top:8px"></div>
    </div>

    <!-- Step 2: Pick direction -->
    <div id="step2" style="display:none">
      <p style="font-size:.85rem;margin-bottom:12px">路線 <b id="sRouteLabel" style="color:var(--cyan)"></b> 有以下方向：</p>
      <div id="dirList" style="display:flex;flex-direction:column;gap:8px"></div>
      <button class="ghost" style="margin-top:12px" onclick="goStep(1)">← 重新搜尋</button>
    </div>

    <!-- Step 3: Pick stop -->
    <div id="step3" style="display:none">
      <div id="step3Loading" style="text-align:center;padding:30px">
        <div style="width:40px;height:40px;border:3px solid rgba(255,255,255,.08);border-top-color:#33e6ff;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px"></div>
        <div style="color:#33e6ff;font-size:.9rem;font-weight:600">載入站位中...</div>
        <div style="color:#94a3b8;font-size:.78rem;margin-top:4px">同時查詢九巴同城巴</div>
      </div>
      <div id="step3Content" style="display:none">
        <p style="font-size:.85rem;margin-bottom:8px">
          <b id="sDirLabel" style="color:#33e6ff"></b> · <span id="sRouteLabel2"></span>
        </p>
        <input id="sFilter" placeholder="篩選站名…（例如：鰂魚涌、英皇道）" style="margin-bottom:10px">
        <div id="stopList" style="max-height:50vh;overflow-y:auto"></div>
        <button class="ghost" style="margin-top:10px" onclick="goStep(2)">← 重新揀方向</button>
      </div>
    </div>
  </div>
</div>

<div id="loadingOverlay" class="loading-overlay hidden">
  <div class="loading-spinner"></div>
  <div class="loading-text" id="loadingText">搜尋中...</div>
  <div class="loading-sub" id="loadingSub"></div>
</div>
<div id="toast" class="toast"></div>

<script>
var refreshTimer=null,cdTimer=null,cdVal=10;
var BK='citybus_eta_bk_v7';
var memoryBK=[];

function showToast(m){var e=document.getElementById('toast');e.textContent=m;e.classList.add('show');clearTimeout(showToast._t);showToast._t=setTimeout(()=>e.classList.remove('show'),2200);}

function getBK(){try{if(!storageOK())return memoryBK;var r=localStorage.getItem(BK);return r?JSON.parse(r):[];}catch{return memoryBK;}}
function saveBK(l){try{if(!storageOK()){memoryBK=l;return;}localStorage.setItem(BK,JSON.stringify(l));}catch{memoryBK=l;}}
function storageOK(){try{localStorage.setItem('__t','1');localStorage.removeItem('__t');return true;}catch{return false;}}
function addBK(it){var bk=getBK();if(bk.some(b=>b.route===it.route&&b.stop_id===it.stop_id&&b.co===it.co)){showToast('已存在');return false;}saveBK([it,...bk].sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0)));renderBK();showToast('已收藏');return true;}

function renderBK(){
  var el=document.getElementById('bmList');
  var bk=getBK();
  if(!bk.length){el.innerHTML='<div style="color:var(--muted);font-size:.76rem;padding:3px 0">未有收藏 · 按 ⚙️ 加入</div>';return;}
  el.innerHTML=bk.map(it=>{
    var opCls=it.co==='KMB'?'kmb':'ctb';
    var opLabel=it.co==='KMB'?'九巴':'城巴';
    return `<div class="bm-chip" data-r="${it.route}" data-s="${it.stop_id}" data-co="${it.co}"><span class="badge ${opCls}">${opLabel}</span><span>${it.custom_name||it.name_tc||it.stop_id} ${it.route}</span></div>`;
  }).join('');
  el.querySelectorAll('.bm-chip').forEach(c=>c.onclick=()=>{
    document.getElementById('routeNo').value=c.dataset.r;
    document.getElementById('stopId').value=c.dataset.s;
    openEta(c.dataset.co);
  });
}

/* ---- Timer ---- */
function startCD(){
  cdVal=10;var sec=document.getElementById('timer');var num=document.getElementById('tNum');var arc=document.getElementById('tArc');var c=175.9;
  sec.classList.remove('hidden');num.textContent=cdVal;arc.style.strokeDashoffset='0';arc.style.stroke='var(--cyan)';
  if(cdTimer)clearInterval(cdTimer);
  cdTimer=setInterval(()=>{cdVal--;if(cdVal<0){num.textContent='0';return;}num.textContent=cdVal;arc.style.strokeDashoffset=(c*(1-cdVal/10)).toString();if(cdVal<=3){num.classList.add('timer-pulse');arc.style.stroke='var(--accent)';}else{num.classList.remove('timer-pulse');arc.style.stroke='var(--cyan)';}},1000);
}

/* ---- ETA ---- */
/* ---- ETA ---- */
async function openEta(forceCo,partnerStop){
  var route=document.getElementById('routeNo').value.trim().toUpperCase();
  var stopInput=document.getElementById('stopId').value.trim();
  var stopParts=stopInput.split('+');
  var stopId=stopParts[0];
  var partner=partnerStop||(stopParts[1]||null);
  var statusEl=document.getElementById('status');var listEl=document.getElementById('etaList');var errEl=document.getElementById('error');
  clearTimers();errEl.textContent='';
  if(!route||!stopId){errEl.textContent='請輸入路線同 Stop ID';return;}
  document.getElementById('checkBtn').disabled=true;
  statusEl.innerHTML='<span class="dot"></span>查詢中…';

  try{
    var allEtas=[];
    var co=forceCo||detectCO(route,stopId);

    // Primary stop
    if(co==='CTB'||co==='ALL'){
      try{var r1=await fetch('https://rt.data.gov.hk/v2/transport/citybus/eta/CTB/'+stopId+'/'+route,{cache:'no-store'});var d1=await r1.json();(d1.data||[]).forEach(function(i){i._co='CTB';allEtas.push(i);});}catch(e){}
    }
    if(co==='KMB'||co==='ALL'){
      try{var r2=await fetch('https://data.etabus.gov.hk/v1/transport/kmb/eta/'+stopId+'/'+route+'/1',{cache:'no-store'});var d2=await r2.json();(d2.data||[]).forEach(function(i){i._co='KMB';allEtas.push(i);});}catch(e){}
    }

    // Partner stop (other operator)
    if(partner){
      var partnerCo=co==='KMB'?'CTB':'KMB';
      if(partnerCo==='CTB'){
        try{var r3=await fetch('https://rt.data.gov.hk/v2/transport/citybus/eta/CTB/'+partner+'/'+route,{cache:'no-store'});var d3=await r3.json();(d3.data||[]).forEach(function(i){i._co='CTB';allEtas.push(i);});}catch(e){}
      }else{
        try{var r4=await fetch('https://data.etabus.gov.hk/v1/transport/kmb/eta/'+partner+'/'+route+'/1',{cache:'no-store'});var d4=await r4.json();(d4.data||[]).forEach(function(i){i._co='KMB';allEtas.push(i);});}catch(e){}
      }
    }

    var items=allEtas.filter(function(i){return i&&i.eta}).sort(function(a,b){return new Date(a.eta)-new Date(b.eta)});
    if(!items.length){statusEl.textContent=route+' 暫時冇 ETA';startCD();refreshTimer=setTimeout(function(){openEta(co,partner)},10000);return;}

    var ops=[...new Set(items.map(function(i){return i._co}))];
    var opLabel=ops.map(function(o){return o==='KMB'?'九巴':'城巴'}).join('+');
    var first=items[0];
    statusEl.innerHTML='<span class="dot"></span>'+route+' → '+(first.dest_tc||'')+' ('+opLabel+') · 自動更新';

    listEl.innerHTML='';
    items.slice(0,5).forEach(function(item,idx){
      var mins=fmtMins(item.eta);
      var isUrgent=mins==='即到'||(typeof mins==='number'&&mins<=2);
      var opCls=item._co==='KMB'?'op-kmb':'op-ctb';
      var opShort=item._co==='KMB'?'九巴':'城巴';
      var pct=typeof mins==='number'?Math.max(5,Math.min(100,100-mins*10)):50;
      var div=document.createElement('div');
      div.className='eta-card'+(idx===0?' first':'');
      div.style.animationDelay=(idx*0.08)+'s';
      div.innerHTML='\n        <div class="eta-row">\n          <div>\n            <div class="eta-time">'+fmtTime(item.eta)+'</div>\n            <div class="eta-dest">→ '+(item.dest_tc||'')+' <span class="op-badge '+opCls+'">'+opShort+'</span></div>\n          </div>\n          <div class="eta-box">\n            <div class="eta-mins '+(isUrgent?'urgent':'')+'">'+mins+'</div>\n            <div class="eta-mins-label">'+(mins==='即到'?'':'分鐘')+'</div>\n          </div>\n        </div>\n        '+(item.rmk_tc?'<div class="eta-remark">📢 '+item.rmk_tc+'</div>':'')+'\n        '+(idx===0?'<div class="eta-progress"><div class="eta-progress-fill" style="width:'+pct+'%"></div></div>':'')+'\n      ';
      listEl.appendChild(div);
    });

    startCD();refreshTimer=setTimeout(function(){openEta(co,partner)},10000);
  }catch(e){errEl.textContent='查詢失敗：'+e.message;statusEl.textContent='';}
  finally{document.getElementById('checkBtn').disabled=false;}
}

function detectCO(route,stopId){
  if(/^[0-9A-F]{16}$/i.test(stopId))return'KMB';
  if(/^\d{6}$/.test(stopId))return'CTB';
  return'ALL';
}
function fmtTime(eta){var t=new Date(eta);if(isNaN(t))return'??';return String(t.getHours()).padStart(2,'0')+':'+String(t.getMinutes()).padStart(2,'0');}
function fmtMins(eta){var t=new Date(eta);if(isNaN(t))return'';var m=Math.max(0,Math.round((t.getTime()-Date.now())/60000));return m===0?'即到':m;}
function clearTimers(){if(refreshTimer){clearTimeout(refreshTimer);refreshTimer=null;}if(cdTimer){clearInterval(cdTimer);cdTimer=null;}}

/* ---- Loading Overlay ---- */
function showLoading(text,sub){
  document.getElementById('loadingText').textContent=text||'搜尋中...';
  document.getElementById('loadingSub').textContent=sub||'';
  document.getElementById('loadingOverlay').classList.remove('hidden');
}
function hideLoading(){document.getElementById('loadingOverlay').classList.add('hidden');}
function updateLoading(text,sub){
  document.getElementById('loadingText').textContent=text;
  if(sub)document.getElementById('loadingSub').textContent=sub;
}

/* ---- 3-Step Search ---- */
var searchState={route:'',co:'',dir:'',dirCode:'',stops:[],stopMap:{}};

function openSearch(){document.getElementById('searchModal').classList.add('show');goStep(1);}
function closeSearch(){document.getElementById('searchModal').classList.remove('show');}

function goStep(n){
  document.getElementById('step1').style.display=n===1?'block':'none';
  document.getElementById('step2').style.display=n===2?'block':'none';
  document.getElementById('step3').style.display=n===3?'block':'none';
  var titles={'1':'🔍 搜尋巴士路線','2':'📍 揀方向','3':'🚏 揀站位'};
  document.getElementById('sTitle').textContent=titles[n]||'搜尋';
}

// Step 1: Find route and show directions
async function findRoute(){
  var route=document.getElementById('sRoute').value.trim().toUpperCase();
  var s1=document.getElementById('sStatus1');
  if(!route){s1.textContent='請輸入路線';return;}
  searchState.route=route;
  showLoading('搜尋路線 '+route+'...','同時查詢九巴同城巴');

  var dirs=[];
  var errors=[];

  // Check KMB
  try{
    var r=await fetch('https://data.etabus.gov.hk/v1/transport/kmb/route-stop',{cache:'no-store'});
    if(r.ok){
      var d=await r.json();
      var kmbRS=(d.data||[]).filter(s=>s.route===route);
      if(kmbRS.length){
        updateLoading('搵到九巴路線...','正在獲取目的地資訊');
        var rr=await fetch('https://data.etabus.gov.hk/v1/transport/kmb/route',{cache:'no-store'});
        if(rr.ok){
          var rd=await rr.json();
          var seen={};
          (rd.data||[]).forEach(r=>{
            if(r.route===route){
              var key=r.bound+'_'+(r.service_type||'1');
              if(!seen[key]){
                seen[key]=true;
                dirs.push({co:'KMB',dir:r.bound,dest:r.bound==='O'?(r.dest_tc||'往外'):(r.orig_tc||r.dest_tc||'返程'),service_type:r.service_type||'1'});
              }
            }
          });
        }
      }
    }
  }catch(e){errors.push('KMB: '+e.message);}

  // Check Citybus
  try{
    updateLoading('查詢城巴路線...','');
    var r1=await fetch('https://rt.data.gov.hk/v2/transport/citybus/route/CTB/'+route,{cache:'no-store'});
    if(r1.ok){
      var d1=await r1.json();
      if(d1.data){
        var info=d1.data;
        // Avoid duplicate if KMB already added same direction
        var hasKmbO=dirs.some(d=>d.co==='KMB'&&d.dir==='O');
        var hasKmbI=dirs.some(d=>d.co==='KMB'&&d.dir==='I');
        if(!hasKmbO)dirs.push({co:'CTB',dir:'O',dest:info.dest_tc||'往外'});
        if(!hasKmbI)dirs.push({co:'CTB',dir:'I',dest:info.orig_tc||info.dest_tc||'返程'});
        // Always add CTB versions if KMB exists (for joint routes)
        if(hasKmbO)dirs.push({co:'CTB',dir:'O',dest:info.dest_tc||'往外'});
        if(hasKmbI)dirs.push({co:'CTB',dir:'I',dest:info.orig_tc||info.dest_tc||'返程'});
      }
    }
  }catch(e){errors.push('CTB: '+e.message);}

  hideLoading();
  if(!dirs.length){s1.textContent='搵唔到路線 '+route+(errors.length?' ('+errors.join(', ')+')':'');return;}
  s1.textContent='';

  // Deduplicate and show
  searchState.co=dirs[0].co;
  var dirEl=document.getElementById('dirList');
  dirEl.innerHTML='';
  dirs.forEach(d=>{
    var opCls=d.co==='KMB'?'op-kmb':'op-ctb';
    var opLabel=d.co==='KMB'?'九巴':'城巴';
    var dirLabel=d.dir==='O'?'往':'返';
    var div=document.createElement('div');
    div.style.cssText='display:flex;align-items:center;gap:12px;padding:14px;border-radius:12px;background:var(--card2,#172033);border:1px solid var(--line);cursor:pointer;transition:all .2s';
    div.innerHTML=`<span style="font-size:1.5rem">${d.dir==='O'?'➡️':'⬅️'}</span><div style="flex:1"><div style="font-weight:700;font-size:1rem">${dirLabel} ${d.dest}</div><div style="font-size:.78rem;color:var(--muted)"><span class="op-badge ${opCls}">${opLabel}</span></div></div><span style="color:var(--muted);font-size:.8rem">→</span>`;
    div.onmouseenter=()=>div.style.borderColor='var(--accent)';
    div.onmouseleave=()=>div.style.borderColor='var(--line)';
    div.onclick=()=>pickDir(d);
    dirEl.appendChild(div);
  });
  goStep(2);
}

// Step 2: Pick direction → load stops
async function pickDir(d){
  searchState.co=d.co;
  searchState.dir=d.dir;
  searchState.dirCode=d.dir==='O'?'outbound':'inbound';
  document.getElementById('sDirLabel').textContent=(d.dir==='O'?'往 ':'返 ')+d.dest;
  document.getElementById('sRouteLabel2').textContent=searchState.route;
  goStep(3);
  document.getElementById('step3Loading').style.display='block';
  document.getElementById('step3Content').style.display='none';

  var stops=[];
  var stopMap={};

  // Load BOTH operators for this route
  try{
    var rsRes=await fetch('https://data.etabus.gov.hk/v1/transport/kmb/route-stop',{cache:'no-store'});
    var rsData=await rsRes.json();
    var kmbStops=(rsData.data||[]).filter(s=>s.route===searchState.route&&s.bound===d.dir);
    var sRes=await fetch('https://data.etabus.gov.hk/v1/transport/kmb/stop',{cache:'no-store'});
    var sData=await sRes.json();
    (sData.data||[]).forEach(s=>{stopMap[s.stop]=s;});
    kmbStops.forEach(s=>{
      var info=stopMap[s.stop]||{};
      stops.push({stop_id:s.stop,name_tc:info.name_tc||'',name_en:info.name_en||'',seq:parseInt(s.seq)||0,co:'KMB',lat:parseFloat(info.lat||0),lng:parseFloat(info.long||0)});
    });
  }catch(e){}
  try{
    var dirParam=d.dir==='O'?'outbound':'inbound';
    var rsRes=await fetch('https://rt.data.gov.hk/v2/transport/citybus/route-stop/CTB/'+searchState.route+'/'+dirParam,{cache:'no-store'});
    var rsData=await rsRes.json();
    for(var s of(rsData.data||[])){
      try{
        var sr=await fetch('https://rt.data.gov.hk/v2/transport/citybus/stop/'+s.stop,{cache:'no-store'});
        var sd=await sr.json();
        var info=sd.data||{};
        stops.push({stop_id:s.stop,name_tc:info.name_tc||'',name_en:info.name_en||'',seq:parseInt(s.seq)||0,co:'CTB',lat:parseFloat(info.lat||0),lng:parseFloat(info.long||0)});
      }catch{}
    }
  }catch(e){}
  // Merge stops from different operators (by location AND name similarity)
  stops.sort((a,b)=>a.seq-b.seq);
  var merged=[],used={};
  stops.forEach(s=>{
    if(used[s.stop_id])return;
    used[s.stop_id]=true;
    var group=[s];
    stops.forEach(s2=>{
      if(used[s2.stop_id]||s2.co===s.co)return;
      var matched=false;
      // Match by lat/lng (< 300m)
      if(s.lat&&s.lng&&s2.lat&&s2.lng){
        var dist=Math.sqrt(Math.pow(s.lat-s2.lat,2)+Math.pow(s.lng-s2.lng,2));
        if(dist<0.003)matched=true;
      }
      // Match by Chinese name (same or contains)
      if(!matched&&s.name_tc&&s2.name_tc){
        var n1=s.name_tc.replace(/[\(（].*?[\)）]/g,'').trim();
        var n2=s2.name_tc.replace(/[\(（].*?[\)）]/g,'').trim();
        if(n1===n2||(n1.length>2&&n2.includes(n1))||(n2.length>2&&n1.includes(n2)))matched=true;
      }
      // Match by English name
      if(!matched&&s.name_en&&s2.name_en){
        var e1=s.name_en.toLowerCase().split(/[\(,]/)[0].trim();
        var e2=s2.name_en.toLowerCase().split(/[\(,]/)[0].trim();
        if(e1===e2&&e1.length>3)matched=true;
      }
      if(matched){group.push(s2);used[s2.stop_id]=true;}
    });
    // Use best name (prefer Chinese)
    var bestName=s.name_tc||s.name_en||'';
    var bestEn=s.name_en||'';
    group.forEach(g=>{if(g.name_tc&&g.name_tc.length>bestName.length)bestName=g.name_tc;if(g.name_en&&g.name_en.length>bestEn.length)bestEn=g.name_en;});
    merged.push({stops:group,name_tc:bestName,name_en:bestEn,seq:s.seq});
  });
  searchState.mergedStops=merged;
  document.getElementById('step3Loading').style.display='none';
  document.getElementById('step3Content').style.display='block';
  renderStops();
}

function renderStops(){
  var filter=document.getElementById('sFilter').value.trim().toLowerCase();
  var listEl=document.getElementById('stopList');
  listEl.innerHTML='';
  var filtered=searchState.mergedStops||[];
  if(filter)filtered=filtered.filter(s=>(s.name_tc||'').toLowerCase().includes(filter)||(s.name_en||'').toLowerCase().includes(filter)||(s.stop_id||'').toLowerCase().includes(filter));

  if(!filtered.length){listEl.innerHTML='<div style="color:var(--muted);font-size:.85rem;text-align:center;padding:20px">搵唔到站</div>';return;}

  filtered.forEach(g=>{
    var div=document.createElement('div');
    div.className='stop-card';
    div.style.cursor='pointer';
    div.style.transition='all .2s';
    var ops=[...new Set(g.stops.map(s=>s.co))];
    var badges=ops.map(o=>'<span class="op-badge '+(o==='KMB'?'op-kmb':'op-ctb')+'">'+(o==='KMB'?'九巴':'城巴')+'</span>').join(' ');
    var stopIds=g.stops.map(s=>s.stop_id).join('+');
    div.innerHTML=`<div class="stop-title">${g.seq? g.seq+'. ':''}${g.name_tc||g.name_en}</div><div class="stop-sub">${badges} ${g.name_en||''}</div><div class="stop-actions"><button onclick="pickAndSearch('${stopIds}','${(g.name_tc||'').replace(/'/g,"\\'")}')">查 ETA</button><button class="sec" onclick="addBK({route:searchState.route,stop_id:'${stopIds}',name_tc:'${(g.name_tc||'').replace(/'/g,"\\'")}',name_en:'${(g.name_en||'').replace(/'/g,"\\'")}',co:'${ops.join('+')}',custom_name:'',pinned:false});showToast('已收藏');">收藏</button></div>`;
    div.onmouseenter=()=>div.style.borderColor='var(--accent)';
    div.onmouseleave=()=>div.style.borderColor='var(--line)';
    listEl.appendChild(div);
  });
}

function pickAndSearch(stopId,name,co){
  document.getElementById('routeNo').value=searchState.route;
  document.getElementById('stopId').value=stopId;
  closeSearch();
  // For joint routes, try to find matching stop from other operator
  var otherCo=co==='KMB'?'CTB':'KMB';
  openEtaWithPartner(stopId,co,otherCo);
}

async function openEtaWithPartner(stopId,co,otherCo){
  // Find nearby stop from other operator using lat/long
  var partnerStop=null;
  try{
    var myInfo=null;
    if(co==='KMB'){
      var res=await fetch('https://data.etabus.gov.hk/v1/transport/kmb/stop/'+stopId,{cache:'no-store'});
      var d=await res.json();
      myInfo=d.data||{};
    }else{
      var res=await fetch('https://rt.data.gov.hk/v2/transport/citybus/stop/'+stopId,{cache:'no-store'});
      var d=await res.json();
      myInfo=d.data||{};
    }
    var myLat=parseFloat(myInfo.lat||0);
    var myLng=parseFloat(myInfo.long||myInfo.lng||0);

    if(myLat&&myLng){
      // Get other operator's stops for same route and find nearest
      var route=searchState.route;
      if(otherCo==='KMB'){
        var rsRes=await fetch('https://data.etabus.gov.hk/v1/transport/kmb/route-stop',{cache:'no-store'});
        var rsData=await rsRes.json();
        var dirCode=searchState.dir==='O'?'O':'I';
        var kmbStops=(rsData.data||[]).filter(s=>s.route===route&&s.bound===dirCode);
        var allStops=await fetch('https://data.etabus.gov.hk/v1/transport/kmb/stop',{cache:'no-store'});
        var allStopsD=await allStops.json();
        var smap={};(allStopsD.data||[]).forEach(s=>{smap[s.stop]=s;});
        var bestDist=Infinity;
        kmbStops.forEach(s=>{
          var info=smap[s.stop]||{};
          var lat=parseFloat(info.lat||0);var lng=parseFloat(info.long||0);
          if(lat&&lng){
            var dist=Math.sqrt(Math.pow(lat-myLat,2)+Math.pow(lng-myLng,2));
            if(dist<bestDist){bestDist=dist;partnerStop=s.stop;}
          }
        });
      }else{
        var dirParam=searchState.dir==='O'?'outbound':'inbound';
        var rsRes=await fetch('https://rt.data.gov.hk/v2/transport/citybus/route-stop/CTB/'+route+'/'+dirParam,{cache:'no-store'});
        var rsData=await rsRes.json();
        var bestDist=Infinity;
        for(var s of(rsData.data||[])){
          try{
            var sr=await fetch('https://rt.data.gov.hk/v2/transport/citybus/stop/'+s.stop,{cache:'no-store'});
            var sd=await sr.json();
            var info=sd.data||{};
            var lat=parseFloat(info.lat||0);var lng=parseFloat(info.long||0);
            if(lat&&lng){
              var dist=Math.sqrt(Math.pow(lat-myLat,2)+Math.pow(lng-myLng,2));
              if(dist<bestDist){bestDist=dist;partnerStop=s.stop;}
            }
          }catch{}
        }
      }
      if(bestDist>0.003)partnerStop=null; // > ~300m = too far, don't match
    }
  }catch(e){}

  if(partnerStop){
    document.getElementById('stopId').value=stopId+'+'+partnerStop;
  }
  openEta(co,partnerStop);
}

document.getElementById('checkBtn').onclick=()=>openEta();
document.getElementById('routeNo').onkeydown=e=>{if(e.key==='Enter')openEta();};
document.getElementById('stopId').onkeydown=e=>{if(e.key==='Enter')openEta();};
document.getElementById('sFilter').oninput=()=>renderStops();
document.getElementById('searchModal').onclick=e=>{if(e.target.id==='searchModal')closeSearch();};
document.getElementById('sRoute').onkeydown=e=>{if(e.key==='Enter')findRoute();};

renderBK();
</script>

<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <title>Citybus ETA Checker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #08111f;
      --panel: #0f172a;
      --panel-2: #172033;
      --line: rgba(255,255,255,0.08);
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #f97316;
      --accent2: #ec4899;
      --gold: #fbbf24;
      --green: #86efac;
      --danger: #fca5a5;
      --chip: rgba(255,255,255,0.05);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top right, rgba(236,72,153,0.12), transparent 25%),
        radial-gradient(circle at top left, rgba(249,115,22,0.12), transparent 28%),
        linear-gradient(180deg, #08111f 0%, #0b1220 100%);
      color: var(--text);
      padding: 8px;
    }
    .app { max-width: 760px; margin: 0 auto; }
    .card {
      background: rgba(15, 23, 42, 0.95);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 14px;
      box-shadow: 0 14px 40px rgba(0,0,0,0.28);
      margin-bottom: 12px;
    }
    h1 { margin: 0; font-size: 1.3rem; line-height: 1.1; }
    h2 { margin: 0; font-size: 0.98rem; }
    .sub, .hint, .status, .meta {
      color: var(--muted);
      font-size: 0.84rem;
    }
    .top-head, .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    label {
      display: block;
      margin: 10px 0 6px;
      color: var(--muted);
      font-size: 0.84rem;
    }
    input, select {
      width: 100%;
      background: #0a1020;
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 12px 13px;
      font-size: 0.96rem;
      outline: none;
    }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
    button {
      border: none;
      border-radius: 999px;
      padding: 12px 16px;
      font-size: 0.94rem;
      font-weight: 800;
      color: white;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      cursor: pointer;
      min-height: 44px;
    }
    button.secondary { background: #243146; color: var(--text); }
    button.ghost {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--muted);
    }
    button.small { padding: 10px 12px; min-height: 38px; font-size: 0.86rem; font-weight: 700; }
    .error { margin-top: 8px; color: var(--danger); font-size: 0.88rem; }
    .toast {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      background: rgba(15,23,42,0.96);
      border: 1px solid var(--line);
      color: var(--text);
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 0.86rem;
      z-index: 200;
      display: none;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    }
    .toast.show { display: block; }

    .bookmark-scroll {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
      flex-wrap: nowrap;
    }
    .bookmark-mini {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
      background: rgba(249,115,22,0.12);
      border: 1px solid rgba(249,115,22,0.18);
      border-radius: 999px;
      padding: 9px 12px;
      min-height: 40px;
      flex: 0 0 auto;
      cursor: pointer;
      font-size: 0.86rem;
      font-weight: 800;
    }
    .bookmark-mini.primary {
      border-color: rgba(251,191,36,0.35);
      background: rgba(251,191,36,0.12);
      color: var(--gold);
    }
    .bookmark-mini .meta-text {
      color: var(--muted);
      font-weight: 600;
      font-size: 0.78rem;
    }

    .eta-list { display: flex; flex-direction: column; gap: 10px; margin-top: 12px; }
    .eta-card {
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
    }
    .eta-top { display: flex; justify-content: space-between; gap: 8px; align-items: center; }
    .eta-time { font-size: 1.22rem; font-weight: 900; color: var(--gold); }
    .eta-away { color: var(--green); font-weight: 800; font-size: 0.86rem; }
    .eta-sub, .eta-remark { margin-top: 5px; color: var(--muted); font-size: 0.83rem; }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(3, 7, 18, 0.72);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 12px;
    }
    .modal-backdrop.show { display: flex; }
    .modal {
      width: min(760px, 100%);
      max-height: 88vh;
      overflow: auto;
      background: #0f172a;
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 16px;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.02), 0 20px 50px rgba(0,0,0,0.45);
    }
    .modal-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
      position: sticky;
      top: 0;
      background: #0f172a;
      padding-bottom: 8px;
      z-index: 2;
    }
    .result-list { display: flex; flex-direction: column; gap: 10px; margin-top: 12px; }
    .stop-card {
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
    }
    .stop-title { font-weight: 800; line-height: 1.28; }
    .stop-sub { margin-top: 6px; color: var(--muted); font-size: 0.84rem; word-break: break-word; }
    .stop-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
    .filter-chip-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }
    .chip {
      background: var(--chip);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 0.8rem;
      color: var(--muted);
    }

    @media (max-width: 560px) {
      .row, .stop-actions { grid-template-columns: 1fr; }
      .actions { flex-direction: column; }
      button { width: 100%; }
      .top-head, .section-head { flex-direction: column; align-items: stretch; }
      .modal { width: 100%; max-height: 86vh; border-radius: 20px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="card">
      <div class="top-head">
        <div>
          <h1>Citybus ETA Checker</h1>
          <div class="sub">超短 bookmark chips，搜尋結果會喺畫面中間 dialog 顯示。</div>
        </div>
        <button id="openConfigBtn" class="secondary small">管理收藏</button>
      </div>

      <div class="section-head">
        <h2>收藏站位</h2>
        <div class="meta">點一下即查</div>
      </div>
      <div id="bookmarkList" class="bookmark-scroll"></div>
    </section>

    <section class="card">
      <div class="section-head">
        <h2>即時到站</h2>
        <div class="meta">route + stop ID</div>
      </div>
      <div class="row">
        <div>
          <label for="routeNo">路線</label>
          <input id="routeNo" value="722" placeholder="例如：722" />
        </div>
        <div>
          <label for="stopId">Stop ID</label>
          <input id="stopId" value="001272" placeholder="例如：001272" />
        </div>
      </div>
      <div class="actions">
        <button id="checkBtn">查詢 ETA</button>
        <button id="saveCurrentBtn" class="secondary">收藏目前站位</button>
      </div>
      <div class="hint" style="margin-top:10px;">查到 ETA 後會每 10 秒自動 refresh，並按時間先後排序。</div>
      <div id="status" class="status"></div>
      <div id="etaList" class="eta-list"></div>
      <div id="error" class="error"></div>
    </section>
  </div>

  <div id="configModal" class="modal-backdrop" aria-hidden="true">
    <div class="modal">
      <div class="modal-head">
        <div>
          <h2 style="margin:0;">搜尋巴士站 / 收藏設定</h2>
          <div class="sub">結果會保持喺畫面中間，不會跌到底部。</div>
        </div>
        <button id="closeConfigBtn" class="ghost small">關閉</button>
      </div>

      <label for="searchRoute">巴士路線</label>
      <input id="searchRoute" value="722" placeholder="例如：722 / 77A / 18X" />

      <div class="row">
        <div>
          <label for="searchDir">方向</label>
          <select id="searchDir">
            <option value="outbound">往目的地 / Outbound</option>
            <option value="inbound">返程 / Inbound</option>
          </select>
        </div>
        <div>
          <label for="filterText">站名篩選</label>
          <input id="filterText" placeholder="例如：鰂魚涌 / 英皇道 / 中環" />
        </div>
      </div>

      <div class="actions">
        <button id="searchBtn">搜尋站位</button>
        <button id="copyToMainBtn" class="secondary">同步路線到主查詢</button>
      </div>
      <div class="filter-chip-row">
        <div class="chip">搜尋後會留喺 dialog 中間</div>
        <div class="chip">可即時 filter</div>
        <div class="chip">可直接加入收藏</div>
      </div>

      <div id="searchStatus" class="status"></div>
      <div id="searchResults" class="result-list"></div>
      <div id="searchError" class="error"></div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    const COMPANY = 'CTB';
    const BOOKMARKS_KEY = 'citybus_eta_bookmarks_v5';
    let refreshTimer = null;
    let searchCache = [];
    let memoryBookmarks = [];

    function showToast(message) {
      const el = document.getElementById('toast');
      el.textContent = message;
      el.classList.add('show');
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => el.classList.remove('show'), 2200);
    }

    function storageAvailable() {
      try {
        const key = '__eta_test__';
        localStorage.setItem(key, '1');
        localStorage.removeItem(key);
        return true;
      } catch {
        return false;
      }
    }

    function buildEtaUrl(route, stopId) {
      return `https://rt.data.gov.hk/v2/transport/citybus/eta/${COMPANY}/${stopId}/${encodeURIComponent(route)}`;
    }
    function buildRouteStopUrl(route, dir) {
      return `https://rt.data.gov.hk/v2/transport/citybus/route-stop/${COMPANY}/${encodeURIComponent(route)}/${dir}`;
    }
    function buildStopUrl(stopId) {
      return `https://rt.data.gov.hk/v2/transport/citybus/stop/${stopId}`;
    }
    function clearRefreshTimer() {
      if (refreshTimer) { clearTimeout(refreshTimer); refreshTimer = null; }
    }
    function formatEtaTime(eta) {
      const t = new Date(eta);
      if (isNaN(t)) return eta || '未知時間';
      return `${String(t.getHours()).padStart(2, '0')}:${String(t.getMinutes()).padStart(2, '0')}`;
    }
    function formatMinutesAway(eta) {
      const t = new Date(eta);
      if (isNaN(t)) return '';
      const mins = Math.max(0, Math.round((t.getTime() - Date.now()) / 60000));
      return mins === 0 ? '即將到站' : `${mins} 分鐘後`;
    }
    function shortBookmarkName(item) {
      return item.custom_name || item.name_tc || item.name_en || item.stop_id;
    }
    function getDirectionLabel(dir) {
      return dir === 'outbound' ? '往目的地' : '返程';
    }
    function getBookmarks() {
      try {
        if (!storageAvailable()) return memoryBookmarks;
        const raw = localStorage.getItem(BOOKMARKS_KEY);
        return raw ? JSON.parse(raw) : [];
      } catch {
        return memoryBookmarks;
      }
    }
    function saveBookmarks(list) {
      try {
        if (!storageAvailable()) {
          memoryBookmarks = list;
          return true;
        }
        localStorage.setItem(BOOKMARKS_KEY, JSON.stringify(list));
        return true;
      } catch {
        memoryBookmarks = list;
        return false;
      }
    }
    function normaliseBookmarks(list) {
      return [...list].sort((a, b) => (b.pinned ? 1 : 0) - (a.pinned ? 1 : 0));
    }
    function addBookmark(item) {
      const bookmarks = getBookmarks();
      const exists = bookmarks.some(b => b.route === item.route && b.stop_id === item.stop_id);
      if (exists) {
        showToast('收藏已存在');
        return false;
      }
      const next = normaliseBookmarks([item, ...bookmarks]);
      const persisted = saveBookmarks(next);
      renderBookmarks();
      showToast(persisted ? '已加入收藏' : '已加入收藏（暫存模式）');
      return true;
    }

    function renderBookmarks() {
      const listEl = document.getElementById('bookmarkList');
      const bookmarks = normaliseBookmarks(getBookmarks());
      listEl.innerHTML = '';
      if (!bookmarks.length) {
        listEl.innerHTML = '<div class="bookmark-mini">未有收藏 <span class="meta-text">請用管理收藏加入</span></div>';
        return;
      }
      bookmarks.forEach((item) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'bookmark-mini' + (item.pinned ? ' primary' : '');
        btn.innerHTML = `${shortBookmarkName(item)} <span class="meta-text">${item.route}</span>`;
        btn.addEventListener('click', () => {
          document.getElementById('routeNo').value = item.route;
          document.getElementById('stopId').value = item.stop_id;
          openEta();
        });
        listEl.appendChild(btn);
      });
    }

    async function openEta() {
      const route = document.getElementById('routeNo').value.trim().toUpperCase();
      const stopId = document.getElementById('stopId').value.trim();
      const statusEl = document.getElementById('status');
      const listEl = document.getElementById('etaList');
      const errEl = document.getElementById('error');
      const btn = document.getElementById('checkBtn');
      clearRefreshTimer();
      statusEl.textContent = '';
      listEl.innerHTML = '';
      errEl.textContent = '';
      if (!route || !stopId) {
        errEl.textContent = '請先輸入路線同 stop ID。';
        return;
      }
      btn.disabled = true;
      statusEl.textContent = '查詢中…';
      try {
        const res = await fetch(buildEtaUrl(route, stopId), { cache: 'no-store' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        const etaItems = (Array.isArray(data.data) ? data.data : [])
          .filter(item => item && item.eta)
          .sort((a, b) => new Date(a.eta) - new Date(b.eta));
        if (!etaItems.length) {
          statusEl.textContent = `${route} 暫時冇 ETA 資料。可能未開服務或者官方未提供即將到站資料。`;
          refreshTimer = setTimeout(openEta, 10000);
          return;
        }
        const first = etaItems[0];
        statusEl.textContent = `${route} → ${first.dest_tc || '目的地'} · 每 10 秒自動更新`;
        etaItems.slice(0, 3).forEach(item => {
          const div = document.createElement('div');
          div.className = 'eta-card';
          div.innerHTML = `
            <div class="eta-top">
              <div class="eta-time">${formatEtaTime(item.eta)}</div>
              <div class="eta-away">${formatMinutesAway(item.eta)}</div>
            </div>
            <div class="eta-sub">stop_id ${item.stop} ・ route ${item.route} ・ ${item.dest_tc || ''}</div>
            ${item.rmk_tc ? `<div class="eta-remark">${item.rmk_tc}</div>` : ''}
          `;
          listEl.appendChild(div);
        });
        refreshTimer = setTimeout(openEta, 10000);
      } catch (err) {
        console.error(err);
        errEl.textContent = '查詢失敗：' + err.message;
      } finally {
        btn.disabled = false;
      }
    }

    function renderSearchResults() {
      const resultEl = document.getElementById('searchResults');
      const filter = document.getElementById('filterText').value.trim().toLowerCase();
      resultEl.innerHTML = '';
      const filtered = searchCache.filter(item => {
        if (!filter) return true;
        const nameTc = (item.stopInfo?.name_tc || '').toLowerCase();
        const nameEn = (item.stopInfo?.name_en || '').toLowerCase();
        const stopId = (item.stop || '').toLowerCase();
        return nameTc.includes(filter) || nameEn.includes(filter) || stopId.includes(filter);
      });
      filtered.forEach(item => {
        const stopInfo = item.stopInfo || {};
        const nameTc = stopInfo.name_tc || item.stop;
        const nameEn = stopInfo.name_en || '';
        const route = document.getElementById('searchRoute').value.trim().toUpperCase();
        const dir = document.getElementById('searchDir').value;
        const div = document.createElement('div');
        div.className = 'stop-card';
        div.innerHTML = `
          <div class="stop-title">${item.seq}. ${nameTc}</div>
          <div class="stop-sub">${nameEn}${nameEn ? ' ・ ' : ''}stop_id ${item.stop}</div>
          <div class="stop-actions">
            <button class="small" data-action="eta">查 ETA</button>
            <button class="small secondary" data-action="bookmark">加入收藏</button>
          </div>
        `;
        div.querySelector('[data-action="eta"]').addEventListener('click', () => {
          document.getElementById('routeNo').value = route;
          document.getElementById('stopId').value = item.stop;
          closeConfig();
          openEta();
        });
        div.querySelector('[data-action="bookmark"]').addEventListener('click', () => {
          const added = addBookmark({
            route,
            stop_id: item.stop,
            name_tc: nameTc,
            name_en: nameEn,
            direction: dir,
            directionLabel: getDirectionLabel(dir),
            pinned: false
          });
          document.getElementById('searchStatus').textContent = added ? `已收藏：${nameTc}` : `已存在收藏：${nameTc}`;
        });
        resultEl.appendChild(div);
      });
      if (!filtered.length) {
        resultEl.innerHTML = '<div class="status">篩選後冇結果。</div>';
      }
    }

    async function searchStops() {
      const route = document.getElementById('searchRoute').value.trim().toUpperCase();
      const dir = document.getElementById('searchDir').value;
      const statusEl = document.getElementById('searchStatus');
      const errEl = document.getElementById('searchError');
      const btn = document.getElementById('searchBtn');
      statusEl.textContent = '';
      errEl.textContent = '';
      document.getElementById('searchResults').innerHTML = '';
      searchCache = [];
      if (!route) {
        errEl.textContent = '請先輸入路線號碼。';
        return;
      }
      btn.disabled = true;
      statusEl.textContent = '搜尋站位中…';
      try {
        const routeStopRes = await fetch(buildRouteStopUrl(route, dir), { cache: 'no-store' });
        if (!routeStopRes.ok) throw new Error('HTTP ' + routeStopRes.status);
        const routeStopJson = await routeStopRes.json();
        const stops = Array.isArray(routeStopJson.data) ? routeStopJson.data : [];
        if (!stops.length) {
          statusEl.textContent = '搵唔到呢條線嘅站位。';
          return;
        }
        statusEl.textContent = `找到 ${stops.length} 個站位`;
        searchCache = await Promise.all(stops.slice(0, 25).map(async item => {
          try {
            const res = await fetch(buildStopUrl(item.stop), { cache: 'no-store' });
            if (!res.ok) return { ...item };
            const json = await res.json();
            return { ...item, stopInfo: json.data || null };
          } catch {
            return { ...item };
          }
        }));
        renderSearchResults();
      } catch (err) {
        console.error(err);
        errEl.textContent = '搜尋失敗：' + err.message;
      } finally {
        btn.disabled = false;
      }
    }

    function saveCurrent() {
      const route = document.getElementById('routeNo').value.trim().toUpperCase();
      const stopId = document.getElementById('stopId').value.trim();
      const statusEl = document.getElementById('status');
      if (!route || !stopId) {
        statusEl.textContent = '請先輸入 route 同 stop ID 先收藏。';
        return;
      }
      const added = addBookmark({
        route,
        stop_id: stopId,
        name_tc: stopId,
        name_en: '',
        direction: '',
        directionLabel: '手動加入',
        pinned: false
      });
      statusEl.textContent = added ? `已收藏 stop_id ${stopId}` : `收藏內已經有 stop_id ${stopId}`;
    }

    function openConfig() {
      const modal = document.getElementById('configModal');
      modal.classList.add('show');
      modal.setAttribute('aria-hidden', 'false');
    }
    function closeConfig() {
      const modal = document.getElementById('configModal');
      modal.classList.remove('show');
      modal.setAttribute('aria-hidden', 'true');
    }

    document.getElementById('checkBtn').addEventListener('click', openEta);
    document.getElementById('saveCurrentBtn').addEventListener('click', saveCurrent);
    document.getElementById('searchBtn').addEventListener('click', searchStops);
    document.getElementById('copyToMainBtn').addEventListener('click', () => {
      document.getElementById('routeNo').value = document.getElementById('searchRoute').value.trim().toUpperCase();
    });
    document.getElementById('openConfigBtn').addEventListener('click', openConfig);
    document.getElementById('closeConfigBtn').addEventListener('click', closeConfig);
    document.getElementById('configModal').addEventListener('click', (e) => {
      if (e.target.id === 'configModal') closeConfig();
    });
    document.getElementById('filterText').addEventListener('input', renderSearchResults);

    renderBookmarks();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <title>Citybus ETA Checker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #08111f;
      --panel: #0f172a;
      --panel-2: #172033;
      --line: rgba(255,255,255,0.08);
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #f97316;
      --accent2: #ec4899;
      --gold: #fbbf24;
      --green: #86efac;
      --danger: #fca5a5;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top right, rgba(236,72,153,0.12), transparent 25%),
        radial-gradient(circle at top left, rgba(249,115,22,0.12), transparent 28%),
        linear-gradient(180deg, #08111f 0%, #0b1220 100%);
      color: var(--text);
      padding: 12px;
    }
    .app { max-width: 820px; margin: 0 auto; }
    .card {
      background: rgba(15, 23, 42, 0.95);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 16px;
      box-shadow: 0 14px 40px rgba(0,0,0,0.28);
      margin-bottom: 14px;
    }
    .sticky-top {
      position: sticky;
      top: 8px;
      z-index: 20;
      backdrop-filter: blur(8px);
    }
    h1 {
      margin: 0;
      font-size: 1.4rem;
      line-height: 1.15;
    }
    h2 {
      margin: 0 0 10px;
      font-size: 1rem;
    }
    .sub {
      margin-top: 6px;
      color: var(--muted);
      font-size: 0.88rem;
    }
    .top-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      color: var(--muted);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 0.8rem;
      white-space: nowrap;
    }
    label {
      display: block;
      margin: 10px 0 6px;
      color: var(--muted);
      font-size: 0.84rem;
    }
    input, select {
      width: 100%;
      background: #0a1020;
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 13px 14px;
      font-size: 0.98rem;
      outline: none;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }
    button {
      border: none;
      border-radius: 999px;
      padding: 12px 16px;
      font-size: 0.95rem;
      font-weight: 800;
      color: white;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      cursor: pointer;
      min-height: 46px;
    }
    button.secondary {
      background: #243146;
      color: var(--text);
    }
    button.ghost {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--muted);
    }
    button.small {
      padding: 10px 13px;
      min-height: 40px;
      font-size: 0.88rem;
      font-weight: 700;
    }
    button:disabled { opacity: 0.6; cursor: default; }
    .bookmark-scroll {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 4px;
      scroll-snap-type: x mandatory;
    }
    .bookmark-chip {
      min-width: 260px;
      background: linear-gradient(180deg, rgba(249,115,22,0.09), rgba(236,72,153,0.05));
      border: 1px solid rgba(249,115,22,0.18);
      border-radius: 18px;
      padding: 14px;
      scroll-snap-align: start;
      flex: 0 0 auto;
    }
    .bookmark-name {
      font-weight: 900;
      font-size: 1rem;
      line-height: 1.2;
    }
    .bookmark-meta {
      margin-top: 6px;
      color: var(--muted);
      font-size: 0.84rem;
    }
    .bookmark-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 12px;
    }
    .status, .hint, .meta { color: var(--muted); font-size: 0.86rem; }
    .status { margin-top: 12px; }
    .error { margin-top: 8px; color: var(--danger); font-size: 0.9rem; }
    .eta-list { display: flex; flex-direction: column; gap: 10px; margin-top: 12px; }
    .eta-card {
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
    }
    .eta-top {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
    }
    .eta-time { font-size: 1.25rem; font-weight: 900; color: var(--gold); }
    .eta-away { color: var(--green); font-weight: 800; font-size: 0.88rem; }
    .eta-sub, .eta-remark { margin-top: 5px; color: var(--muted); font-size: 0.84rem; }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(3, 7, 18, 0.72);
      display: none;
      align-items: flex-end;
      justify-content: center;
      z-index: 100;
      padding: 0;
    }
    .modal-backdrop.show { display: flex; }
    .modal {
      width: min(900px, 100%);
      max-height: 92vh;
      overflow: auto;
      background: #0f172a;
      border: 1px solid var(--line);
      border-top-left-radius: 24px;
      border-top-right-radius: 24px;
      padding: 16px;
      box-shadow: 0 -10px 40px rgba(0,0,0,0.4);
    }
    .modal-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
      position: sticky;
      top: 0;
      background: #0f172a;
      padding-bottom: 8px;
    }
    .result-list { display: flex; flex-direction: column; gap: 10px; margin-top: 12px; }
    .stop-card {
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
    }
    .stop-title { font-weight: 800; line-height: 1.28; }
    .stop-sub { margin-top: 6px; color: var(--muted); font-size: 0.84rem; word-break: break-word; }
    .stop-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }

    @media (max-width: 560px) {
      body { padding: 8px; }
      .row, .bookmark-actions, .stop-actions { grid-template-columns: 1fr; }
      .actions { flex-direction: column; }
      button { width: 100%; }
      .top-head { flex-direction: column; align-items: stretch; }
      .bookmark-chip { min-width: 82vw; }
      .sticky-top { top: 4px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="card sticky-top">
      <div class="top-head">
        <div>
          <h1>Citybus ETA Checker</h1>
          <div class="sub">Bookmark 放最頂，一撳即查；搜尋站位放入獨立設定視窗。</div>
        </div>
        <div class="pill">Mobile Friendly · 10s Refresh</div>
      </div>

      <h2>收藏站位</h2>
      <div id="bookmarkList" class="bookmark-scroll"></div>
      <div class="actions">
        <button id="openConfigBtn" class="secondary">搜尋站位 / 管理收藏</button>
      </div>
    </section>

    <section class="card">
      <h2>即時到站</h2>
      <div class="row">
        <div>
          <label for="routeNo">路線</label>
          <input id="routeNo" value="722" placeholder="例如：722" />
        </div>
        <div>
          <label for="stopId">Stop ID</label>
          <input id="stopId" value="001272" placeholder="例如：001272" />
        </div>
      </div>
      <div class="actions">
        <button id="checkBtn">查詢 ETA</button>
        <button id="saveCurrentBtn" class="secondary">收藏目前站位</button>
      </div>
      <div class="hint" style="margin-top:10px;">查到 ETA 後會每 10 秒自動 refresh，並按時間先後排序。</div>
      <div id="status" class="status"></div>
      <div id="etaList" class="eta-list"></div>
      <div id="error" class="error"></div>
    </section>
  </div>

  <div id="configModal" class="modal-backdrop" aria-hidden="true">
    <div class="modal">
      <div class="modal-head">
        <div>
          <h2 style="margin:0;">搜尋巴士站 / 收藏設定</h2>
          <div class="sub">先搵站，再加入 bookmark。</div>
        </div>
        <button id="closeConfigBtn" class="ghost small">關閉</button>
      </div>

      <label for="searchRoute">巴士路線</label>
      <input id="searchRoute" value="722" placeholder="例如：722 / 77A / 18X" />

      <label for="searchDir">方向</label>
      <select id="searchDir">
        <option value="outbound">往目的地 / Outbound</option>
        <option value="inbound">返程 / Inbound</option>
      </select>

      <div class="actions">
        <button id="searchBtn">搜尋站位</button>
        <button id="copyToMainBtn" class="secondary">同步路線到主查詢</button>
      </div>

      <div id="searchStatus" class="status"></div>
      <div id="searchResults" class="result-list"></div>
      <div id="searchError" class="error"></div>
    </div>
  </div>

  <script>
    const COMPANY = 'CTB';
    const BOOKMARKS_KEY = 'citybus_eta_bookmarks_v3';
    let refreshTimer = null;

    function buildEtaUrl(route, stopId) {
      return `https://rt.data.gov.hk/v2/transport/citybus/eta/${COMPANY}/${stopId}/${encodeURIComponent(route)}`;
    }
    function buildRouteStopUrl(route, dir) {
      return `https://rt.data.gov.hk/v2/transport/citybus/route-stop/${COMPANY}/${encodeURIComponent(route)}/${dir}`;
    }
    function buildStopUrl(stopId) {
      return `https://rt.data.gov.hk/v2/transport/citybus/stop/${stopId}`;
    }
    function clearRefreshTimer() {
      if (refreshTimer) {
        clearTimeout(refreshTimer);
        refreshTimer = null;
      }
    }
    function formatEtaTime(eta) {
      const t = new Date(eta);
      if (isNaN(t)) return eta || '未知時間';
      return `${String(t.getHours()).padStart(2, '0')}:${String(t.getMinutes()).padStart(2, '0')}`;
    }
    function formatMinutesAway(eta) {
      const t = new Date(eta);
      if (isNaN(t)) return '';
      const mins = Math.max(0, Math.round((t.getTime() - Date.now()) / 60000));
      return mins === 0 ? '即將到站' : `${mins} 分鐘後`;
    }
    function getDirectionLabel(dir) {
      return dir === 'outbound' ? '往目的地' : '返程';
    }
    function getBookmarks() {
      try {
        const raw = localStorage.getItem(BOOKMARKS_KEY);
        return raw ? JSON.parse(raw) : [];
      } catch {
        return [];
      }
    }
    function saveBookmarks(list) {
      localStorage.setItem(BOOKMARKS_KEY, JSON.stringify(list));
    }
    function addBookmark(item) {
      const bookmarks = getBookmarks();
      const exists = bookmarks.some(b => b.route === item.route && b.stop_id === item.stop_id);
      if (exists) return false;
      bookmarks.unshift(item);
      saveBookmarks(bookmarks);
      renderBookmarks();
      return true;
    }
    function removeBookmark(index) {
      const next = getBookmarks().filter((_, i) => i !== index);
      saveBookmarks(next);
      renderBookmarks();
    }

    function renderBookmarks() {
      const listEl = document.getElementById('bookmarkList');
      const bookmarks = getBookmarks();
      listEl.innerHTML = '';
      if (!bookmarks.length) {
        listEl.innerHTML = '<div class="bookmark-chip"><div class="bookmark-name">未有收藏</div><div class="bookmark-meta">撳「搜尋站位 / 管理收藏」加入常用站位。</div></div>';
        return;
      }
      bookmarks.forEach((item, index) => {
        const div = document.createElement('div');
        div.className = 'bookmark-chip';
        div.innerHTML = `
          <div class="bookmark-name">${item.name_tc || item.name_en || item.stop_id}</div>
          <div class="bookmark-meta">${item.route} ・ ${item.directionLabel || ''} ・ stop_id ${item.stop_id}</div>
          <div class="bookmark-actions">
            <button class="small" data-action="use">查 ETA</button>
            <button class="small secondary" data-action="remove">刪除</button>
          </div>
        `;
        div.querySelector('[data-action="use"]').addEventListener('click', () => {
          document.getElementById('routeNo').value = item.route;
          document.getElementById('stopId').value = item.stop_id;
          openEta();
        });
        div.querySelector('[data-action="remove"]').addEventListener('click', () => {
          removeBookmark(index);
        });
        listEl.appendChild(div);
      });
    }

    async function openEta() {
      const route = document.getElementById('routeNo').value.trim().toUpperCase();
      const stopId = document.getElementById('stopId').value.trim();
      const statusEl = document.getElementById('status');
      const listEl = document.getElementById('etaList');
      const errEl = document.getElementById('error');
      const btn = document.getElementById('checkBtn');

      clearRefreshTimer();
      statusEl.textContent = '';
      listEl.innerHTML = '';
      errEl.textContent = '';

      if (!route || !stopId) {
        errEl.textContent = '請先輸入路線同 stop ID。';
        return;
      }

      btn.disabled = true;
      statusEl.textContent = '查詢中…';
      try {
        const res = await fetch(buildEtaUrl(route, stopId), { cache: 'no-store' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        const etaItems = (Array.isArray(data.data) ? data.data : [])
          .filter(item => item && item.eta)
          .sort((a, b) => new Date(a.eta) - new Date(b.eta));

        if (!etaItems.length) {
          statusEl.textContent = `${route} 暫時冇 ETA 資料。可能未開服務或者官方未提供即將到站資料。`;
          refreshTimer = setTimeout(openEta, 10000);
          return;
        }

        const first = etaItems[0];
        statusEl.textContent = `${route} → ${first.dest_tc || '目的地'} · 每 10 秒自動更新`;
        etaItems.slice(0, 3).forEach(item => {
          const div = document.createElement('div');
          div.className = 'eta-card';
          div.innerHTML = `
            <div class="eta-top">
              <div class="eta-time">${formatEtaTime(item.eta)}</div>
              <div class="eta-away">${formatMinutesAway(item.eta)}</div>
            </div>
            <div class="eta-sub">stop_id ${item.stop} ・ route ${item.route} ・ ${item.dest_tc || ''}</div>
            ${item.rmk_tc ? `<div class="eta-remark">${item.rmk_tc}</div>` : ''}
          `;
          listEl.appendChild(div);
        });
        refreshTimer = setTimeout(openEta, 10000);
      } catch (err) {
        console.error(err);
        errEl.textContent = '查詢失敗：' + err.message;
      } finally {
        btn.disabled = false;
      }
    }

    async function searchStops() {
      const route = document.getElementById('searchRoute').value.trim().toUpperCase();
      const dir = document.getElementById('searchDir').value;
      const statusEl = document.getElementById('searchStatus');
      const resultEl = document.getElementById('searchResults');
      const errEl = document.getElementById('searchError');
      const btn = document.getElementById('searchBtn');
      statusEl.textContent = '';
      resultEl.innerHTML = '';
      errEl.textContent = '';

      if (!route) {
        errEl.textContent = '請先輸入路線號碼。';
        return;
      }

      btn.disabled = true;
      statusEl.textContent = '搜尋站位中…';
      try {
        const routeStopRes = await fetch(buildRouteStopUrl(route, dir), { cache: 'no-store' });
        if (!routeStopRes.ok) throw new Error('HTTP ' + routeStopRes.status);
        const routeStopJson = await routeStopRes.json();
        const stops = Array.isArray(routeStopJson.data) ? routeStopJson.data : [];
        if (!stops.length) {
          statusEl.textContent = '搵唔到呢條線嘅站位。';
          return;
        }
        statusEl.textContent = `找到 ${stops.length} 個站位`;

        const details = await Promise.all(stops.slice(0, 25).map(async item => {
          try {
            const res = await fetch(buildStopUrl(item.stop), { cache: 'no-store' });
            if (!res.ok) return { ...item };
            const json = await res.json();
            return { ...item, stopInfo: json.data || null };
          } catch {
            return { ...item };
          }
        }));

        details.forEach(item => {
          const stopInfo = item.stopInfo || {};
          const nameTc = stopInfo.name_tc || item.stop;
          const nameEn = stopInfo.name_en || '';
          const div = document.createElement('div');
          div.className = 'stop-card';
          div.innerHTML = `
            <div class="stop-title">${item.seq}. ${nameTc}</div>
            <div class="stop-sub">${nameEn}${nameEn ? ' ・ ' : ''}stop_id ${item.stop}</div>
            <div class="stop-actions">
              <button class="small" data-action="eta">查 ETA</button>
              <button class="small secondary" data-action="bookmark">加入收藏</button>
            </div>
          `;
          div.querySelector('[data-action="eta"]').addEventListener('click', () => {
            document.getElementById('routeNo').value = route;
            document.getElementById('stopId').value = item.stop;
            closeConfig();
            openEta();
          });
          div.querySelector('[data-action="bookmark"]').addEventListener('click', () => {
            const added = addBookmark({
              route,
              stop_id: item.stop,
              name_tc: nameTc,
              name_en: nameEn,
              direction: dir,
              directionLabel: getDirectionLabel(dir)
            });
            statusEl.textContent = added ? `已收藏：${nameTc}` : `已存在收藏：${nameTc}`;
          });
          resultEl.appendChild(div);
        });
      } catch (err) {
        console.error(err);
        errEl.textContent = '搜尋失敗：' + err.message;
      } finally {
        btn.disabled = false;
      }
    }

    function saveCurrent() {
      const route = document.getElementById('routeNo').value.trim().toUpperCase();
      const stopId = document.getElementById('stopId').value.trim();
      const statusEl = document.getElementById('status');
      if (!route || !stopId) {
        statusEl.textContent = '請先輸入 route 同 stop ID 先收藏。';
        return;
      }
      const added = addBookmark({
        route,
        stop_id: stopId,
        name_tc: stopId,
        name_en: '',
        direction: '',
        directionLabel: '手動加入'
      });
      statusEl.textContent = added ? `已收藏 stop_id ${stopId}` : `收藏內已經有 stop_id ${stopId}`;
    }

    function openConfig() {
      const modal = document.getElementById('configModal');
      modal.classList.add('show');
      modal.setAttribute('aria-hidden', 'false');
    }
    function closeConfig() {
      const modal = document.getElementById('configModal');
      modal.classList.remove('show');
      modal.setAttribute('aria-hidden', 'true');
    }

    document.getElementById('checkBtn').addEventListener('click', openEta);
    document.getElementById('saveCurrentBtn').addEventListener('click', saveCurrent);
    document.getElementById('searchBtn').addEventListener('click', searchStops);
    document.getElementById('copyToMainBtn').addEventListener('click', () => {
      document.getElementById('routeNo').value = document.getElementById('searchRoute').value.trim().toUpperCase();
    });
    document.getElementById('openConfigBtn').addEventListener('click', openConfig);
    document.getElementById('closeConfigBtn').addEventListener('click', closeConfig);
    document.getElementById('configModal').addEventListener('click', (e) => {
      if (e.target.id === 'configModal') closeConfig();
    });

    renderBookmarks();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <title>Citybus 巴士站 ETA 查詢</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #0b1220;
      --panel: #111827;
      --panel-2: #1f2937;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --line: #374151;
      --accent: #f97316;
      --accent-2: #ec4899;
      --good: #fbbf24;
      --bad: #fca5a5;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #0b1220 0%, #111827 100%);
      color: var(--text);
      padding: 20px;
    }
    .wrap {
      max-width: 920px;
      margin: 0 auto;
    }
    .hero {
      margin-bottom: 18px;
    }
    .hero h1 {
      margin: 0 0 6px;
      font-size: 1.6rem;
    }
    .hero p {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
    }
    .grid {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 16px;
    }
    .card {
      background: rgba(17, 24, 39, 0.92);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.28);
    }
    .card h2 {
      margin: 0 0 12px;
      font-size: 1rem;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    label {
      display: block;
      color: var(--muted);
      font-size: 0.85rem;
      margin: 10px 0 6px;
    }
    input, select {
      width: 100%;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px 13px;
      font-size: 0.95rem;
    }
    button {
      border: none;
      border-radius: 999px;
      padding: 11px 15px;
      font-size: 0.95rem;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
    }
    button.secondary {
      background: #253045;
      color: var(--text);
      font-weight: 600;
    }
    button.small {
      font-size: 0.85rem;
      padding: 8px 12px;
    }
    button:disabled {
      opacity: 0.6;
      cursor: default;
    }
    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }
    .status {
      margin-top: 14px;
      color: var(--muted);
      font-size: 0.92rem;
    }
    .error {
      margin-top: 8px;
      color: var(--bad);
      font-size: 0.9rem;
    }
    .eta-list {
      margin-top: 12px;
    }
    .eta-item {
      background: var(--bg);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 14px;
      padding: 12px 14px;
      margin-top: 10px;
    }
    .eta-time {
      color: var(--good);
      font-size: 1.1rem;
      font-weight: 800;
    }
    .eta-meta, .eta-remark {
      margin-top: 4px;
      color: var(--muted);
      font-size: 0.84rem;
    }
    .result-list {
      margin-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 420px;
      overflow: auto;
    }
    .stop-item {
      border: 1px solid rgba(255,255,255,0.06);
      background: var(--bg);
      border-radius: 14px;
      padding: 12px;
    }
    .stop-title {
      font-weight: 700;
      margin-bottom: 4px;
    }
    .stop-sub {
      color: var(--muted);
      font-size: 0.84rem;
      margin-bottom: 10px;
      word-break: break-word;
    }
    .bookmark-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 10px;
    }
    .bookmark-item {
      background: var(--bg);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 14px;
      padding: 12px;
    }
    .bookmark-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: start;
    }
    .bookmark-name {
      font-weight: 700;
    }
    .bookmark-meta {
      color: var(--muted);
      font-size: 0.84rem;
      margin-top: 4px;
    }
    .bookmark-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }
    .hint {
      color: var(--muted);
      font-size: 0.82rem;
      margin-top: 8px;
    }
    @media (max-width: 820px) {
      .grid {
        grid-template-columns: 1fr;
      }
      .row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>Citybus 巴士站 ETA 查詢</h1>
      <p>查指定路線 + stop ID 的到站時間，亦可以按巴士號碼搜尋站位再收藏。</p>
    </div>

    <div class="grid">
      <div>
        <div class="card">
          <h2>查 ETA</h2>
          <div class="row">
            <div>
              <label for="routeNo">路線</label>
              <input id="routeNo" value="722" placeholder="例如：722 / 18X / 77A" />
            </div>
            <div>
              <label for="stopId">巴士站編號（stop ID）</label>
              <input id="stopId" value="001272" placeholder="例如：001272" />
            </div>
          </div>

          <div class="actions">
            <button id="checkBtn">查詢到站時間</button>
          </div>
          <div class="hint">支援 Citybus（CTB）v2 API。成功查詢後每 10 秒自動更新。</div>

          <div id="status" class="status"></div>
          <div id="etaList" class="eta-list"></div>
          <div id="error" class="error"></div>
        </div>

        <div class="card" style="margin-top:16px;">
          <h2>按巴士號碼搵站</h2>
          <div class="row">
            <div>
              <label for="searchRoute">路線</label>
              <input id="searchRoute" value="722" placeholder="例如：722" />
            </div>
            <div>
              <label for="searchDir">方向</label>
              <select id="searchDir">
                <option value="outbound">往目的地 / Outbound</option>
                <option value="inbound">返程 / Inbound</option>
              </select>
            </div>
          </div>
          <div class="actions">
            <button id="searchBtn">搜尋站位</button>
            <button id="copyToMainBtn" class="secondary">將搜尋路線同步到上面</button>
          </div>
          <div class="hint">搜尋結果可直接「查 ETA」或「加入收藏」。</div>
          <div id="searchStatus" class="status"></div>
          <div id="searchResults" class="result-list"></div>
          <div id="searchError" class="error"></div>
        </div>
      </div>

      <div>
        <div class="card">
          <h2>我的收藏</h2>
          <div class="hint">收藏會儲存在瀏覽器本機（localStorage）。</div>
          <div id="bookmarkList" class="bookmark-list"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const COMPANY = 'CTB';
    const BOOKMARKS_KEY = 'citybus_eta_bookmarks_v1';
    let refreshTimer = null;

    function buildEtaUrl(route, stopId) {
      return `https://rt.data.gov.hk/v2/transport/citybus/eta/${COMPANY}/${stopId}/${encodeURIComponent(route)}`;
    }

    function buildRouteStopUrl(route, dir) {
      return `https://rt.data.gov.hk/v2/transport/citybus/route-stop/${COMPANY}/${encodeURIComponent(route)}/${dir}`;
    }

    function buildStopUrl(stopId) {
      return `https://rt.data.gov.hk/v2/transport/citybus/stop/${stopId}`;
    }

    function clearRefreshTimer() {
      if (refreshTimer) {
        clearTimeout(refreshTimer);
        refreshTimer = null;
      }
    }

    function formatEtaTime(eta) {
      const t = new Date(eta);
      if (isNaN(t)) return eta || '未知時間';
      const hh = String(t.getHours()).padStart(2, '0');
      const mm = String(t.getMinutes()).padStart(2, '0');
      return `${hh}:${mm}`;
    }

    function formatMinutesAway(eta) {
      const t = new Date(eta);
      if (isNaN(t)) return '';
      const mins = Math.max(0, Math.round((t.getTime() - Date.now()) / 60000));
      return mins === 0 ? '即將到站' : `${mins} 分鐘後`;
    }

    function getDirectionLabel(dir) {
      return dir === 'outbound' ? '往目的地' : '返程';
    }

    function getBookmarks() {
      try {
        const raw = localStorage.getItem(BOOKMARKS_KEY);
        return raw ? JSON.parse(raw) : [];
      } catch {
        return [];
      }
    }

    function saveBookmarks(list) {
      localStorage.setItem(BOOKMARKS_KEY, JSON.stringify(list));
    }

    function renderBookmarks() {
      const listEl = document.getElementById('bookmarkList');
      const bookmarks = getBookmarks();
      listEl.innerHTML = '';

      if (bookmarks.length === 0) {
        listEl.innerHTML = '<div class="hint">未有收藏站位。</div>';
        return;
      }

      bookmarks.forEach((item, index) => {
        const div = document.createElement('div');
        div.className = 'bookmark-item';
        div.innerHTML = `
          <div class="bookmark-head">
            <div>
              <div class="bookmark-name">${item.name_tc || item.name_en || item.stop_id}</div>
              <div class="bookmark-meta">路線：${item.route} ・ ${item.directionLabel} ・ stop_id：${item.stop_id}</div>
            </div>
          </div>
          <div class="bookmark-actions">
            <button class="small" data-action="use">查 ETA</button>
            <button class="small secondary" data-action="remove">刪除</button>
          </div>
        `;

        div.querySelector('[data-action="use"]').addEventListener('click', () => {
          document.getElementById('routeNo').value = item.route;
          document.getElementById('stopId').value = item.stop_id;
          openEta();
        });

        div.querySelector('[data-action="remove"]').addEventListener('click', () => {
          const next = getBookmarks().filter((_, i) => i !== index);
          saveBookmarks(next);
          renderBookmarks();
        });

        listEl.appendChild(div);
      });
    }

    function addBookmark(item) {
      const bookmarks = getBookmarks();
      const exists = bookmarks.some(b => b.route === item.route && b.stop_id === item.stop_id);
      if (exists) return false;
      bookmarks.unshift(item);
      saveBookmarks(bookmarks);
      renderBookmarks();
      return true;
    }

    async function openEta() {
      const route = document.getElementById('routeNo').value.trim().toUpperCase();
      const stopId = document.getElementById('stopId').value.trim();
      const statusEl = document.getElementById('status');
      const listEl = document.getElementById('etaList');
      const errEl = document.getElementById('error');
      const btn = document.getElementById('checkBtn');

      clearRefreshTimer();
      statusEl.textContent = '';
      listEl.innerHTML = '';
      errEl.textContent = '';

      if (!route || !stopId) {
        errEl.textContent = '請先輸入路線同 stop ID。';
        return;
      }

      btn.disabled = true;
      statusEl.textContent = '查詢中…';

      try {
        const res = await fetch(buildEtaUrl(route, stopId), { cache: 'no-store' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        const etaItems = (Array.isArray(data.data) ? data.data : [])
          .filter(item => item && item.eta)
          .sort((a, b) => new Date(a.eta) - new Date(b.eta));

        if (etaItems.length === 0) {
          statusEl.textContent = `${route} 暫時冇 ETA 資料。可能未開服務、未有即將到站班次，或者官方暫時未提供資料。`;
          refreshTimer = setTimeout(openEta, 10000);
          return;
        }

        const first = etaItems[0];
        statusEl.textContent = `${route}（${first.dest_tc || '目的地'}）即將到站 · 每 10 秒自動更新`;

        etaItems.slice(0, 3).forEach(item => {
          const div = document.createElement('div');
          div.className = 'eta-item';
          const remark = item.rmk_tc || '';
          div.innerHTML = `
            <div class="eta-time">${formatEtaTime(item.eta)}</div>
            <div class="eta-meta">${formatMinutesAway(item.eta)} ・ stop_id ${item.stop}</div>
            ${remark ? `<div class="eta-remark">${remark}</div>` : ''}
          `;
          listEl.appendChild(div);
        });

        refreshTimer = setTimeout(openEta, 10000);
      } catch (err) {
        console.error(err);
        errEl.textContent = '查詢失敗：' + err.message;
      } finally {
        btn.disabled = false;
      }
    }

    async function searchStops() {
      const route = document.getElementById('searchRoute').value.trim().toUpperCase();
      const dir = document.getElementById('searchDir').value;
      const statusEl = document.getElementById('searchStatus');
      const resultEl = document.getElementById('searchResults');
      const errEl = document.getElementById('searchError');
      const btn = document.getElementById('searchBtn');

      statusEl.textContent = '';
      resultEl.innerHTML = '';
      errEl.textContent = '';

      if (!route) {
        errEl.textContent = '請先輸入路線號碼。';
        return;
      }

      btn.disabled = true;
      statusEl.textContent = '搜尋站位中…';

      try {
        const routeStopRes = await fetch(buildRouteStopUrl(route, dir), { cache: 'no-store' });
        if (!routeStopRes.ok) throw new Error('HTTP ' + routeStopRes.status);
        const routeStopJson = await routeStopRes.json();
        const stops = Array.isArray(routeStopJson.data) ? routeStopJson.data : [];

        if (stops.length === 0) {
          statusEl.textContent = '搵唔到呢條路線的站位。';
          return;
        }

        statusEl.textContent = `找到 ${stops.length} 個站位`; 

        const topStops = stops.slice(0, 25);
        const stopDetails = await Promise.all(
          topStops.map(async (item) => {
            try {
              const res = await fetch(buildStopUrl(item.stop), { cache: 'no-store' });
              if (!res.ok) return { ...item };
              const json = await res.json();
              return { ...item, stopInfo: json.data || null };
            } catch {
              return { ...item };
            }
          })
        );

        stopDetails.forEach(item => {
          const stopInfo = item.stopInfo || {};
          const nameTc = stopInfo.name_tc || item.stop;
          const nameEn = stopInfo.name_en || '';
          const div = document.createElement('div');
          div.className = 'stop-item';
          div.innerHTML = `
            <div class="stop-title">${item.seq}. ${nameTc}</div>
            <div class="stop-sub">${nameEn}${nameEn ? ' ・ ' : ''}stop_id：${item.stop}</div>
            <div class="bookmark-actions">
              <button class="small" data-action="eta">查 ETA</button>
              <button class="small secondary" data-action="bookmark">加入收藏</button>
            </div>
          `;

          div.querySelector('[data-action="eta"]').addEventListener('click', () => {
            document.getElementById('routeNo').value = route;
            document.getElementById('stopId').value = item.stop;
            openEta();
          });

          div.querySelector('[data-action="bookmark"]').addEventListener('click', () => {
            const added = addBookmark({
              route,
              stop_id: item.stop,
              name_tc: nameTc,
              name_en: nameEn,
              direction: dir,
              directionLabel: getDirectionLabel(dir)
            });
            if (added) {
              statusEl.textContent = `已收藏：${nameTc}`;
            } else {
              statusEl.textContent = `已存在收藏：${nameTc}`;
            }
          });

          resultEl.appendChild(div);
        });
      } catch (err) {
        console.error(err);
        errEl.textContent = '搜尋失敗：' + err.message;
      } finally {
        btn.disabled = false;
      }
    }

    document.getElementById('checkBtn').addEventListener('click', openEta);
    document.getElementById('searchBtn').addEventListener('click', searchStops);
    document.getElementById('copyToMainBtn').addEventListener('click', () => {
      document.getElementById('routeNo').value = document.getElementById('searchRoute').value.trim().toUpperCase();
    });

    renderBookmarks();
  </script>
</body>
</html>

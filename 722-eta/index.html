<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <title>Citybus ETA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #08111f;
      --panel: #0f172a;
      --panel-2: #172033;
      --line: rgba(255,255,255,0.08);
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #f97316;
      --accent2: #ec4899;
      --gold: #fbbf24;
      --green: #86efac;
      --cyan: #33e6ff;
      --danger: #fca5a5;
      --chip: rgba(255,255,255,0.05);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top right, rgba(236,72,153,0.10), transparent 25%),
        radial-gradient(circle at top left, rgba(249,115,22,0.10), transparent 28%),
        linear-gradient(180deg, #08111f 0%, #0b1220 100%);
      color: var(--text);
      padding: 6px;
      min-height: 100vh;
    }
    .app { max-width: 760px; margin: 0 auto; }

    /* Compact Search Bar */
    .search-bar {
      background: rgba(15,23,42,0.95);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 10px 12px;
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }
    .search-bar input {
      background: #0a1020;
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 0.95rem;
      outline: none;
      width: 100px;
      transition: border-color .2s;
    }
    .search-bar input:focus { border-color: var(--accent); }
    .search-bar input::placeholder { color: var(--muted); }
    .search-bar input.route-input { width: 70px; font-weight: 800; text-align: center; font-size: 1.1rem; }
    .search-bar input.stop-input { flex: 1; min-width: 0; }
    .search-bar .search-label { color: var(--muted); font-size: .72rem; display: flex; flex-direction: column; gap: 2px; }
    .search-bar button {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.88rem;
      font-weight: 800;
      color: white;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .search-bar button:disabled { opacity: .5; }
    .search-bar .icon-btn {
      background: rgba(255,255,255,0.06);
      color: var(--muted);
      padding: 10px;
      font-size: 1rem;
      border-radius: 10px;
    }

    /* Bookmarks */
    .bookmarks-card {
      background: rgba(15,23,42,0.95);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 10px 12px;
      margin-bottom: 10px;
    }
    .bookmark-scroll { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px; }
    .bookmark-chip {
      display: inline-flex; align-items: center; gap: 6px;
      white-space: nowrap;
      background: rgba(249,115,22,0.10);
      border: 1px solid rgba(249,115,22,0.15);
      border-radius: 999px;
      padding: 7px 12px;
      flex: 0 0 auto;
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--text);
      transition: all .2s;
    }
    .bookmark-chip:hover { background: rgba(249,115,22,0.2); border-color: rgba(249,115,22,0.3); }
    .bookmark-chip .route-badge {
      background: rgba(249,115,22,0.2);
      color: var(--accent);
      border-radius: 6px;
      padding: 2px 6px;
      font-size: .72rem;
      font-weight: 800;
    }

    /* Timer - Prominent */
    .timer-section {
      text-align: center;
      padding: 8px 0;
      margin-bottom: 6px;
    }
    .timer-ring {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      position: relative;
      width: 80px;
      height: 80px;
    }
    .timer-ring svg { position: absolute; inset: 0; transform: rotate(-90deg); }
    .timer-ring .countdown {
      font-size: 1.6rem;
      font-weight: 900;
      color: var(--cyan);
      z-index: 1;
    }
    .timer-label { color: var(--muted); font-size: .75rem; margin-top: 2px; }
    .timer-pulse {
      animation: timerPulse 1s ease infinite;
    }
    @keyframes timerPulse {
      0%,100% { opacity: 1; }
      50% { opacity: .5; }
    }
    .timer-section.hidden { display: none; }

    /* Status line */
    .status-line {
      text-align: center;
      color: var(--muted);
      font-size: .82rem;
      margin-bottom: 10px;
    }
    .status-line .live-dot {
      display: inline-block;
      width: 8px; height: 8px;
      background: var(--green);
      border-radius: 50%;
      margin-right: 4px;
      animation: livePulse 2s ease infinite;
      vertical-align: middle;
    }
    @keyframes livePulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(134,239,172,.5); }
      50% { box-shadow: 0 0 0 6px rgba(134,239,172,0); }
    }

    /* ETA Cards - Fancy */
    .eta-list { display: flex; flex-direction: column; gap: 10px; }
    .eta-card {
      background: linear-gradient(135deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      position: relative;
      overflow: hidden;
      transition: all .3s;
      animation: cardIn .4s ease;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(12px) scale(.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .eta-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      border-radius: 4px 0 0 4px;
    }
    .eta-card:first-child::before { background: var(--green); }
    .eta-card:nth-child(2)::before { background: var(--gold); }
    .eta-card:nth-child(3)::before { background: var(--accent); }

    .eta-card.first { border-color: rgba(134,239,172,.2); background: linear-gradient(135deg, rgba(0,230,118,.04), transparent); }

    .eta-row { display: flex; justify-content: space-between; align-items: center; }
    .eta-big-time {
      font-size: 2rem;
      font-weight: 900;
      letter-spacing: -.02em;
      background: linear-gradient(135deg, var(--gold), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .eta-card.first .eta-big-time {
      background: linear-gradient(135deg, var(--green), var(--cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .eta-countdown-box {
      text-align: right;
    }
    .eta-mins {
      font-size: 1.5rem;
      font-weight: 900;
      color: var(--green);
    }
    .eta-mins.urgent {
      color: var(--accent);
      animation: urgentPulse 1s ease infinite;
    }
    @keyframes urgentPulse {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }
    .eta-mins-label { color: var(--muted); font-size: .72rem; }

    .eta-dest {
      margin-top: 6px;
      color: var(--muted);
      font-size: .82rem;
    }
    .eta-remark {
      margin-top: 4px;
      font-size: .78rem;
      color: var(--gold);
      background: rgba(251,191,36,.08);
      border-radius: 8px;
      padding: 4px 8px;
      display: inline-block;
    }

    /* Progress bar under first ETA */
    .eta-progress {
      height: 3px;
      background: rgba(255,255,255,.06);
      border-radius: 4px;
      margin-top: 10px;
      overflow: hidden;
    }
    .eta-progress-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 1s linear;
    }
    .eta-card.first .eta-progress-fill { background: linear-gradient(90deg, var(--green), var(--cyan)); }

    /* Error */
    .error { color: var(--danger); font-size: .85rem; text-align: center; margin-top: 8px; }

    /* Modal */
    .modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(3,7,18,.75);
      display: none; align-items: center; justify-content: center;
      z-index: 100; padding: 12px;
    }
    .modal-backdrop.show { display: flex; }
    .modal {
      width: min(760px, 100%);
      max-height: 88vh; overflow: auto;
      background: #0f172a;
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 16px;
      box-shadow: 0 20px 50px rgba(0,0,0,.45);
    }
    .modal-head { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 12px; }
    .modal label { display: block; margin: 8px 0 4px; color: var(--muted); font-size: .82rem; }
    .modal input, .modal select {
      width: 100%;
      background: #0a1020;
      color: var(--text);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 12px;
      padding: 10px 12px;
      font-size: .92rem;
      outline: none;
    }
    .modal .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .modal .actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
    .modal button {
      border: none; border-radius: 999px; padding: 10px 14px;
      font-size: .88rem; font-weight: 700; color: white; cursor: pointer;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
    }
    .modal button.secondary { background: #243146; color: var(--text); }
    .modal button.ghost { background: transparent; border: 1px solid rgba(255,255,255,.1); color: var(--muted); }
    .modal button.small { padding: 8px 12px; font-size: .82rem; }

    .result-list { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
    .stop-card {
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
    }
    .stop-title { font-weight: 800; font-size: .92rem; }
    .stop-sub { margin-top: 4px; color: var(--muted); font-size: .8rem; }
    .stop-actions { display: flex; gap: 6px; margin-top: 8px; }
    .stop-actions button { flex: 1; }

    .toast {
      position: fixed; left: 50%; bottom: 18px;
      transform: translateX(-50%);
      background: rgba(15,23,42,.96);
      border: 1px solid var(--line);
      color: var(--text);
      border-radius: 999px;
      padding: 8px 14px;
      font-size: .84rem;
      z-index: 200;
      display: none;
      box-shadow: 0 10px 30px rgba(0,0,0,.35);
    }
    .toast.show { display: block; }

    .meta { color: var(--muted); font-size: .78rem; }

    @media (max-width: 560px) {
      .search-bar { flex-wrap: wrap; }
      .search-bar input.route-input { width: 60px; }
      .search-bar input.stop-input { width: 100%; }
      .modal { width: 100%; max-height: 86vh; }
      .modal .row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="app">
  <!-- Compact Search Bar -->
  <div class="search-bar">
    <div class="search-label">
      <span style="font-size:.65rem;color:var(--muted)">路線</span>
      <input id="routeNo" class="route-input" value="722" placeholder="722" />
    </div>
    <div class="search-label" style="flex:1;min-width:0">
      <span style="font-size:.65rem;color:var(--muted)">Stop ID</span>
      <input id="stopId" class="stop-input" value="001272" placeholder="001272" />
    </div>
    <button id="checkBtn">🔍 查</button>
    <button class="icon-btn" id="openConfigBtn" title="搜尋 & 收藏">⚙️</button>
  </div>

  <!-- Bookmarks -->
  <div class="bookmarks-card">
    <div id="bookmarkList" class="bookmark-scroll"></div>
  </div>

  <!-- Timer - Prominent at top -->
  <div id="timerSection" class="timer-section hidden">
    <div class="timer-ring">
      <svg width="80" height="80" viewBox="0 0 80 80">
        <circle cx="40" cy="40" r="34" fill="none" stroke="rgba(255,255,255,.06)" stroke-width="4"/>
        <circle id="timerArc" cx="40" cy="40" r="34" fill="none" stroke="var(--cyan)" stroke-width="4"
          stroke-dasharray="213.6" stroke-dashoffset="0" stroke-linecap="round"/>
      </svg>
      <span id="countdownNum" class="countdown">10</span>
    </div>
    <div class="timer-label">秒後自動更新</div>
  </div>

  <!-- Status -->
  <div id="statusLine" class="status-line"></div>

  <!-- ETA List -->
  <div id="etaList" class="eta-list"></div>
  <div id="error" class="error"></div>
</div>

<!-- Config Modal -->
<div id="configModal" class="modal-backdrop" aria-hidden="true">
  <div class="modal">
    <div class="modal-head">
      <div>
        <h2 style="margin:0;font-size:1rem;">搜尋巴士站 / 收藏</h2>
        <div class="meta">結果喺 dialog 中間顯示</div>
      </div>
      <button id="closeConfigBtn" class="ghost small">✕</button>
    </div>
    <label>巴士路線</label>
    <input id="searchRoute" value="722" placeholder="722 / 77A / 18X" />
    <div class="row">
      <div>
        <label>方向</label>
        <select id="searchDir">
          <option value="outbound">往目的地</option>
          <option value="inbound">返程</option>
        </select>
      </div>
      <div>
        <label>站名篩選</label>
        <input id="filterText" placeholder="鰂魚涌 / 英皇道" />
      </div>
    </div>
    <div class="actions">
      <button id="searchBtn">搜尋站位</button>
      <button id="copyToMainBtn" class="secondary">同步路線</button>
    </div>
    <div id="searchStatus" class="meta" style="margin-top:8px"></div>
    <div id="searchResults" class="result-list"></div>
    <div id="searchError" class="error"></div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
const COMPANY='CTB', BOOKMARKS_KEY='citybus_eta_bookmarks_v6';
let refreshTimer=null, countdownTimer=null, countdownVal=10;
let searchCache=[], memoryBookmarks=[];

function showToast(m){const el=document.getElementById('toast');el.textContent=m;el.classList.add('show');clearTimeout(showToast._t);showToast._t=setTimeout(()=>el.classList.remove('show'),2200);}
function storageAvailable(){try{localStorage.setItem('__t__','1');localStorage.removeItem('__t__');return true;}catch{return false;}}
function buildEtaUrl(r,s){return`https://rt.data.gov.hk/v2/transport/citybus/eta/${COMPANY}/${s}/${encodeURIComponent(r)}`;}
function buildRouteStopUrl(r,d){return`https://rt.data.gov.hk/v2/transport/citybus/route-stop/${COMPANY}/${encodeURIComponent(r)}/${d}`;}
function buildStopUrl(s){return`https://rt.data.gov.hk/v2/transport/citybus/stop/${s}`;}
function clearTimers(){if(refreshTimer){clearTimeout(refreshTimer);refreshTimer=null;}if(countdownTimer){clearInterval(countdownTimer);countdownTimer=null;}}
function fmtTime(eta){const t=new Date(eta);if(isNaN(t))return'??';return`${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}`;}
function fmtMins(eta){const t=new Date(eta);if(isNaN(t))return'';const m=Math.max(0,Math.round((t.getTime()-Date.now())/60000));return m===0?'即到':m;}

function getBookmarks(){try{if(!storageAvailable())return memoryBookmarks;const r=localStorage.getItem(BOOKMARKS_KEY);return r?JSON.parse(r):[];}catch{return memoryBookmarks;}}
function saveBookmarks(l){try{if(!storageAvailable()){memoryBookmarks=l;return;}localStorage.setItem(BOOKMARKS_KEY,JSON.stringify(l));}catch{memoryBookmarks=l;}}
function addBookmark(item){const bm=getBookmarks();if(bm.some(b=>b.route===item.route&&b.stop_id===item.stop_id)){showToast('已存在');return false;}saveBookmarks([item,...bm].sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0)));renderBookmarks();showToast('已收藏');return true;}

function renderBookmarks(){
  const el=document.getElementById('bookmarkList');
  const bm=getBookmarks();
  if(!bm.length){el.innerHTML='<div style="color:var(--muted);font-size:.8rem;padding:4px 0">未有收藏 · 按 ⚙️ 加入</div>';return;}
  el.innerHTML=bm.map(it=>`<div class="bookmark-chip" data-route="${it.route}" data-stop="${it.stop_id}"><span class="route-badge">${it.route}</span>${it.custom_name||it.name_tc||it.stop_id}</div>`).join('');
  el.querySelectorAll('.bookmark-chip').forEach(c=>c.addEventListener('click',()=>{
    document.getElementById('routeNo').value=c.dataset.route;
    document.getElementById('stopId').value=c.dataset.stop;
    openEta();
  }));
}

/* ---- Countdown Timer ---- */
function startCountdown(){
  countdownVal=10;
  const section=document.getElementById('timerSection');
  const num=document.getElementById('countdownNum');
  const arc=document.getElementById('timerArc');
  const circumference=213.6;
  section.classList.remove('hidden');
  num.textContent=countdownVal;
  arc.style.strokeDashoffset='0';
  if(countdownTimer) clearInterval(countdownTimer);
  countdownTimer=setInterval(()=>{
    countdownVal--;
    if(countdownVal<0){num.textContent='0';return;}
    num.textContent=countdownVal;
    arc.style.strokeDashoffset=(circumference*(1-countdownVal/10)).toString();
    if(countdownVal<=3){num.classList.add('timer-pulse');arc.style.stroke='var(--accent)';}
    else{num.classList.remove('timer-pulse');arc.style.stroke='var(--cyan)';}
  },1000);
}

/* ---- ETA ---- */
async function openEta(){
  const route=document.getElementById('routeNo').value.trim().toUpperCase();
  const stopId=document.getElementById('stopId').value.trim();
  const statusEl=document.getElementById('statusLine');
  const listEl=document.getElementById('etaList');
  const errEl=document.getElementById('error');
  clearTimers();
  errEl.textContent='';
  if(!route||!stopId){errEl.textContent='請輸入路線同 Stop ID';return;}
  document.getElementById('checkBtn').disabled=true;
  statusEl.innerHTML='<span class="live-dot"></span>查詢中…';
  try{
    const res=await fetch(buildEtaUrl(route,stopId),{cache:'no-store'});
    if(!res.ok)throw new Error('HTTP '+res.status);
    const data=await res.json();
    const items=(Array.isArray(data.data)?data.data:[]).filter(i=>i&&i.eta).sort((a,b)=>new Date(a.eta)-new Date(b.eta));
    if(!items.length){
      statusEl.textContent=`${route} 暫時冇 ETA`;
      startCountdown();
      refreshTimer=setTimeout(()=>{openEta();},10000);
      return;
    }
    const first=items[0];
    statusEl.innerHTML=`<span class="live-dot"></span>${route} → ${first.dest_tc||''} · 自動更新中`;

    listEl.innerHTML='';
    items.slice(0,3).forEach((item,idx)=>{
      const mins=fmtMins(item.eta);
      const isUrgent=typeof mins==='number'&&mins<=2;
      const isUrgentText=mins==='即到';
      const pct=typeof mins==='number'?Math.max(5,Math.min(100,100-mins*10)):50;
      const div=document.createElement('div');
      div.className='eta-card'+(idx===0?' first':'');
      div.style.animationDelay=(idx*0.1)+'s';
      div.innerHTML=`
        <div class="eta-row">
          <div>
            <div class="eta-big-time">${fmtTime(item.eta)}</div>
            <div class="eta-dest">→ ${item.dest_tc||'目的地'} ${item.route?'・ '+item.route:''}</div>
          </div>
          <div class="eta-countdown-box">
            <div class="eta-mins ${isUrgent||isUrgentText?'urgent':''}">${mins}</div>
            <div class="eta-mins-label">${isUrgentText?'':'分鐘'}</div>
          </div>
        </div>
        ${item.rmk_tc?`<div class="eta-remark">📢 ${item.rmk_tc}</div>`:''}
        ${idx===0?`<div class="eta-progress"><div class="eta-progress-fill" style="width:${pct}%"></div></div>`:''}
      `;
      listEl.appendChild(div);
    });

    startCountdown();
    refreshTimer=setTimeout(()=>{openEta();},10000);
  }catch(err){
    errEl.textContent='查詢失敗：'+err.message;
    statusEl.textContent='';
  }finally{
    document.getElementById('checkBtn').disabled=false;
  }
}

/* ---- Search ---- */
async function searchStops(){
  const route=document.getElementById('searchRoute').value.trim().toUpperCase();
  const dir=document.getElementById('searchDir').value;
  const statusEl=document.getElementById('searchStatus');
  const errEl=document.getElementById('searchError');
  const btn=document.getElementById('searchBtn');
  statusEl.textContent='';errEl.textContent='';
  document.getElementById('searchResults').innerHTML='';
  searchCache=[];
  if(!route){errEl.textContent='請輸入路線';return;}
  btn.disabled=true;statusEl.textContent='搜尋中…';
  try{
    const res=await fetch(buildRouteStopUrl(route,dir),{cache:'no-store'});
    if(!res.ok)throw new Error('HTTP '+res.status);
    const json=await res.json();
    const stops=Array.isArray(json.data)?json.data:[];
    if(!stops.length){statusEl.textContent='搵唔到站位';return;}
    statusEl.textContent=`搵到 ${stops.length} 個站`;
    searchCache=await Promise.all(stops.slice(0,25).map(async item=>{
      try{const r=await fetch(buildStopUrl(item.stop),{cache:'no-store'});if(!r.ok)return{...item};const j=await r.json();return{...item,stopInfo:j.data||null};}catch{return{...item};}
    }));
    renderSearchResults();
  }catch(err){errEl.textContent='搜尋失敗：'+err.message;}
  finally{btn.disabled=false;}
}

function renderSearchResults(){
  const el=document.getElementById('searchResults');
  const filter=document.getElementById('filterText').value.trim().toLowerCase();
  el.innerHTML='';
  const route=document.getElementById('searchRoute').value.trim().toUpperCase();
  const dir=document.getElementById('searchDir').value;
  const filtered=searchCache.filter(i=>{
    if(!filter)return true;
    return(i.stopInfo?.name_tc||'').toLowerCase().includes(filter)||(i.stopInfo?.name_en||'').toLowerCase().includes(filter)||(i.stop||'').toLowerCase().includes(filter);
  });
  filtered.forEach(item=>{
    const info=item.stopInfo||{};
    const ntc=info.name_tc||item.stop;
    const nen=info.name_en||'';
    const div=document.createElement('div');div.className='stop-card';
    div.innerHTML=`<div class="stop-title">${item.seq}. ${ntc}</div><div class="stop-sub">${nen}${nen?' ・ ':''}${item.stop}</div><div class="stop-actions"><button class="small" data-a="eta">查 ETA</button><button class="small secondary" data-a="bm">收藏</button></div>`;
    div.querySelector('[data-a="eta"]').onclick=()=>{document.getElementById('routeNo').value=route;document.getElementById('stopId').value=item.stop;closeConfig();openEta();};
    div.querySelector('[data-a="bm"]').onclick=()=>{addBookmark({route,stop_id:item.stop,name_tc:ntc,name_en:nen,direction:dir,pinned:false});};
    el.appendChild(div);
  });
  if(!filtered.length)el.innerHTML='<div class="meta">冇結果</div>';
}

function saveCurrent(){
  const route=document.getElementById('routeNo').value.trim().toUpperCase();
  const stopId=document.getElementById('stopId').value.trim();
  if(!route||!stopId)return;
  addBookmark({route,stop_id:stopId,name_tc:stopId,name_en:'',direction:'',pinned:false});
}

function openConfig(){document.getElementById('configModal').classList.add('show');}
function closeConfig(){document.getElementById('configModal').classList.remove('show');}

document.getElementById('checkBtn').onclick=openEta;
document.getElementById('openConfigBtn').onclick=openConfig;
document.getElementById('closeConfigBtn').onclick=closeConfig;
document.getElementById('configModal').onclick=e=>{if(e.target.id==='configModal')closeConfig();};
document.getElementById('searchBtn').onclick=searchStops;
document.getElementById('copyToMainBtn').onclick=()=>{document.getElementById('routeNo').value=document.getElementById('searchRoute').value.trim().toUpperCase();};
document.getElementById('filterText').oninput=renderSearchResults;

renderBookmarks();
</script>
</body>
</html>
